/* ---------------- helpers ---------------- */
const esc = (s = "") =>
  String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");

const cardAccent = (card) =>
  card.accent === "custom"
    ? { light: card.customLight, dark: card.customDark }
    : { light: (ACCENTS[card.accent] || ACCENTS.green).light, dark: (ACCENTS[card.accent] || ACCENTS.green).dark };

/* auto-prepend "/" to link paths (leaves full URLs and #anchors alone) */
const normPath = (v) => (!v || /^[/#]/.test(v) || /^https?:/i.test(v) ? v : "/" + v);

/* Font Awesome <i> markup (emoji falls back to the raw character) */
const iconMarkup = (o) =>
  o && o.iconType === "fa"
    ? `<i class="fa-${o.faStyle || "solid"} fa-${esc(String(o.icon || "").replace(/^fa-/, ""))}" aria-hidden="true"></i>`
    : esc(o ? o.icon : "");

const encodeConfig = (cfg) => btoa(unescape(encodeURIComponent(JSON.stringify(cfg))));
const decodeConfig = (s) => JSON.parse(decodeURIComponent(escape(atob(s))));

/* ---------------- config migration / normalization ---------------- */
const normCard = (c) => ({ ...CARD_DEFAULTS, ...c, id: c.id || uid() });

const normColumn = (c) => makeColumn({ ...c, id: c && c.id });
const normSection = (s) => ({
  id: s.id || uid(),
  type: s.type === "columns" ? "columns" : "cards",
  heading: s.heading || "",
  intro: s.intro || "",
  align: s.align === "left" ? "left" : "center",
  source: s.source === "liquid" ? "liquid" : "static",
  /* older saved sections keep their own look ("custom"); the global style is
     opt-in per section so migrating never changes an existing page's cards */
  styleMode: s.styleMode === "global" ? "global" : "custom",
  style: { ...DEFAULT_STYLE, ...(s.style || {}), num: false, file: false },
  layout: { ...DEFAULT_SECTION_LAYOUT, ...(s.layout || {}) },
  liquid: { ...DEFAULT_LIQUID, ...(s.liquid || {}) },
  columns: (s.columns && s.columns.length ? s.columns.slice(0, 4) : DEFAULT_COLUMNS()).map(normColumn),
  cards: (s.cards && s.cards.length ? s.cards : DEFAULT_CONFIG.sections[0].cards).map(normCard),
});

/* Reassign any duplicate section/card ids (legacy data saved before ids were
   collision-proof) so React keys stay unique — otherwise deleting/editing one
   section hits its duplicate too. */
function dedupeIds(sections) {
  const seen = new Set();
  return sections.map((s) => {
    let id = s.id;
    if (!id || seen.has(id)) id = uid();
    seen.add(id);
    const cards = s.cards.map((c) => {
      let cid = c.id;
      if (!cid || seen.has(cid)) cid = uid();
      seen.add(cid);
      return cid === c.id ? c : { ...c, id: cid };
    });
    return { ...s, id, cards };
  });
}

/* merge a (possibly older/partial) shared config over the defaults */
function migrateConfig(loaded) {
  const D = DEFAULT_CONFIG;
  const base = {
    fonts: loaded.fonts || D.fonts,
    hero: { ...D.hero, ...(loaded.hero || {}) },
    ticker: { ...D.ticker, ...(loaded.ticker || {}) },
    searchMode: loaded.searchMode || (loaded.moveSearch === false ? "native" : "hero"),
    flattenHeader: loaded.flattenHeader !== false,
    headerImage: { ...D.headerImage, ...(loaded.headerImage || {}) },
    theme: { ...D.theme, ...(loaded.theme || {}) },
    cardStyle: { ...DEFAULT_STYLE, ...(loaded.cardStyle || {}), num: false, file: false },
    layout: { maxW: (loaded.layout && loaded.layout.maxW) || 1120 },
    banner: { ...D.banner, ...(loaded.banner || {}) },
    footer: loaded.footer != null ? loaded.footer : D.footer,
  };

  /* already v4 (has sections) */
  if (loaded.sections && loaded.sections.length) {
    return { ...base, sections: dedupeIds(loaded.sections.map(normSection)) };
  }

  /* migrate v3 (single template + flat cards) into one section */
  const grid = loaded.layout || {};
  const section = normSection({
    heading: (loaded.section && loaded.section.title) || "",
    intro: (loaded.section && loaded.section.text) || "",
    align: loaded.hero && loaded.hero.align === "left" ? "left" : "center",
    source: loaded.liquid && loaded.liquid.enabled ? "liquid" : "static",
    style: TEMPLATE_TO_STYLE[loaded.template] || DEFAULT_STYLE,
    layout: {
      colMin: grid.colMin || 258,
      gap: grid.gap || 20,
      autoH: !!grid.autoH,
      cardMinH: grid.cardMinH || 396,
      bento: loaded.template === "bento",
    },
    liquid: loaded.liquid || {},
    cards: loaded.cards || [],
  });
  return { ...base, sections: [section] };
}

/* ============================================================
   NAMED DESIGNS — localStorage-backed "my pages" + autosave
   Each design: { id, name, config, override, updatedAt }
   ============================================================ */
const DESIGNS_KEY = "glp-builder:designs";
const CURRENT_KEY = "glp-builder:currentId";
const nowMs = () => Date.now();

const relTime = (t) => {
  const s = Math.max(0, Math.floor((Date.now() - t) / 1000));
  if (s < 45) return "just now";
  const m = Math.floor(s / 60);
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  if (h < 24) return h + "h ago";
  return Math.floor(h / 24) + "d ago";
};

const makeDesign = (name, config, override) => ({ id: uid(), name, config, override: override || "", updatedAt: nowMs() });

function persistDesigns(ds, curId) {
  try {
    localStorage.setItem(DESIGNS_KEY, JSON.stringify(ds));
    if (curId) localStorage.setItem(CURRENT_KEY, curId);
  } catch (e) {
    /* storage unavailable (private mode / sandbox) — autosave silently disabled */
  }
}

/* choose the initial working state: shared link → last-open page → a fresh page */
function loadInitialState() {
  let designs = [];
  try {
    const raw = localStorage.getItem(DESIGNS_KEY);
    if (raw) designs = JSON.parse(raw);
  } catch (e) {}
  if (!Array.isArray(designs)) designs = [];

  /* a shared #c= link opens unsaved, regardless of saved pages */
  try {
    const m = window.location.hash.match(/#c=([A-Za-z0-9+/=]+)/);
    if (m) return { config: migrateConfig(decodeConfig(m[1])), override: null, designs, currentId: null, sharedView: true };
  } catch (e) {}

  let curId = null;
  try { curId = localStorage.getItem(CURRENT_KEY); } catch (e) {}
  const cur = designs.find((d) => d.id === curId) || designs[0];
  if (cur) return { config: migrateConfig(cur.config), override: cur.override || null, designs, currentId: cur.id, sharedView: false };

  const d = makeDesign("Untitled page", DEFAULT_CONFIG, "");
  return { config: DEFAULT_CONFIG, override: null, designs: [d], currentId: d.id, sharedView: false };
}

/* ============================================================

const INLINE_CARD_STYLE =
  'style="background-color: var(--card-bg) !important; background: var(--card-bg) !important; border: 1px solid var(--card-border) !important; border-radius: var(--card-radius) !important; box-shadow: var(--card-shadow) !important; backdrop-filter: var(--card-blur) !important; -webkit-backdrop-filter: var(--card-blur) !important;"';

/* card markup builder — used for both static cards and the Liquid loop
   (vars are either literal strings or Liquid tags) */
function buildCard(v, style) {
  const primaryCls = v.primary ? " bnk-card--primary" : "";
  const openTag = style.anchor
    ? `<a class="bnk-card ${v.accentClass}${primaryCls}" href="${v.href}"\n       ${INLINE_CARD_STYLE}>`
    : `<div class="bnk-card ${v.accentClass}${primaryCls}"\n       ${INLINE_CARD_STYLE}>`;
  const closeTag = style.anchor ? "</a>" : "</div>";

  /* content lives in a growing body so cards stay equal height and the CTA
     keeps a consistent gap / bottom-aligns regardless of content length */
  let body = "";
  if (style.file) body += `\n        <span class="bnk-card__eyebrow">${v.fileLabel}</span>`;
  else if (style.badge) body += `\n        <span class="bnk-card__eyebrow">${v.badgeHtml}${v.eyebrow}</span>`;
  if (style.num) body += `\n        <span class="bnk-card__num">${v.num}</span>`;
  if (style.icon) body += `\n        <span class="bnk-card__icon" aria-hidden="true">${v.icon}</span>`;
  body += `\n        <span class="bnk-card__title">${v.title}</span>`;
  body += `\n        <span class="bnk-card__blurb">${v.blurb}</span>`;
  if (style.peek && v.peekHtml) body += `\n${v.peekHtml}`;

  let foot = "";
  if (style.cta) {
    const ctaCls = style.ctaPlain
      ? "bnk-card__go bnk-card__go--plain"
      : `bnk-card__go bnk-card__go--${v.ctaStyle === "filled" ? "filled" : "ghost"}`;
    foot = style.anchor
      ? `\n      <span class="${ctaCls}">${v.ctaText}<span class="rm-arrow" aria-hidden="true">&#8594;</span></span>`
      : `\n      <a class="${ctaCls}" href="${v.href}">${v.ctaText}<span class="rm-arrow" aria-hidden="true">&#8594;</span></a>`;
  } else if (style.anchor) {
    /* whole-card link with no CTA → trailing arrow (compact "tiles" feel) */
    foot = `\n      <span class="rm-arrow bnk-card__arrow" aria-hidden="true">&#8594;</span>`;
  }

  const inner = `\n      <span class="bnk-card__body">${body}\n      </span>${foot}`;

  return `    <!-- ${v.comment} -->\n    ${openTag}${inner}\n    ${closeTag}`;
}

function staticPeek(c) {
  const items = c.peekItems.filter((p) => p.trim());
  if (!items.length) return "";
  return `      <span class="bnk-card__peek">
        <span class="bnk-card__peek-label">${esc(c.peekLabel)}</span>
${items
  .map((p) => `        <span class="bnk-card__peek-item">${c.peekArrows ? '<span class="bnk-tick">&#8594;</span>' : ""}${esc(p)}</span>`)
  .join("\n")}
      </span>`;
}

/* build the cards for one section — static list or a Liquid loop.
   `style` is the section's effective card style (its own or the global one). */
function sectionCards(sec, palette, style) {
  const N = Math.max(1, palette.length);
  if (sec.source !== "liquid") {
    return sec.cards
      .map((c, i) =>
        buildCard(
          {
            accentClass: `bnk-card--a${i}`,
            primary: c.primary,
            href: esc(c.href),
            eyebrow: esc(c.eyebrow),
            badgeHtml: c.badge === "lock" ? LOCK_SVG : '<span class="bnk-dot"></span>',
            icon: iconMarkup(c),
            num: String(i + 1).padStart(2, "0"),
            fileLabel: `File_${String(i + 1).padStart(2, "0")}${c.eyebrow.trim() ? " // " + esc(c.eyebrow) : ""}`,
            title: esc(c.title),
            blurb: esc(c.blurb),
            peekHtml: staticPeek(c),
            ctaText: esc(c.ctaText),
            ctaStyle: c.ctaStyle,
            comment: `Card ${i + 1} — ${esc(c.title)}`,
          },
          style
        )
      )
      .join("\n\n");
  }

  const Q = sec.liquid;
  const liquidPeek = Q.peek
    ? `      <span class="bnk-card__peek">
        <span class="bnk-card__peek-label">${esc(Q.peekLabel)}</span>
        {% for category in child.guides limit: ${Q.peekCount} %}
        <span class="bnk-card__peek-item">{{ category.title }}</span>
        {% endfor %}
      </span>`
    : "";
  const inner = buildCard(
    {
      accentClass: "bnk-card--a{{ ai }}",
      primary: false,
      href: "/{{ child.subpath }}",
      eyebrow: esc(Q.eyebrow),
      badgeHtml: Q.badge === "lock" ? LOCK_SVG : '<span class="bnk-dot"></span>',
      icon: iconMarkup(Q),
      num: "{% if forloop.index < 10 %}0{% endif %}{{ forloop.index }}",
      fileLabel: `File_{% if forloop.index < 10 %}0{% endif %}{{ forloop.index }}${Q.eyebrow.trim() ? " // " + esc(Q.eyebrow) : ""}`,
      title: "{{ child.name }}",
      blurb: `{{ child.description | default: "${esc(Q.blurbFallback)}" }}`,
      peekHtml: liquidPeek,
      ctaText: esc(Q.ctaText),
      ctaStyle: Q.ctaStyle,
      comment: "One card per child project (Liquid)",
    },
    style
  );
  return `    {% for child in parentProject.childrenProjects %}
    {% assign ai = forloop.index0 | modulo: ${N} %}
${inner}
    {% endfor %}`;
}

/* build a text-columns section (1–4 evenly-distributed columns) */
function sectionColumns(sec) {
  const cols = (sec.columns || []).slice(0, 4);
  return cols
    .map((col, i) => {
      const parts = [];
      if ((col.heading || "").trim()) parts.push(`      <h3 class="bnk-col__title">${esc(col.heading)}</h3>`);
      if ((col.body || "").trim()) parts.push(`      <p class="bnk-col__text">${esc(col.body)}</p>`);
      const cta = col.cta || {};
      if (cta.enabled && (cta.label || "").trim()) {
        const cls = cta.style === "button" ? "bnk-col__cta bnk-col__cta--btn" : "bnk-col__cta";
        parts.push(
          `      <a class="${cls}" href="${esc(normPath(cta.href || "/"))}">${esc(cta.label)}<span class="rm-arrow" aria-hidden="true">&#8594;</span></a>`
        );
      }
      return `    <!-- Column ${i + 1} -->\n    <div class="bnk-col">\n${parts.join("\n")}\n    </div>`;
    })
    .join("\n\n");
}

/* ============================================================
   NAIVE LIQUID EXPANSION — for the live preview only.
   ReadMe renders the real Liquid server-side; here we substitute
   sample child projects so the preview looks real. Handles any
   number of per-section child-project loops.
   ============================================================ */
const SAMPLE_PROJECTS = [
  { name: "Payments API", subpath: "payments", desc: "Accept payments, manage refunds, and reconcile settlements." },
  { name: "Identity", subpath: "identity", desc: "SSO, MFA, and user permission management for your apps." },
  { name: "Client SDKs", subpath: "sdks", desc: "Official libraries for Node, Python, Go, and React Native." },
];
const SAMPLE_CATEGORIES = ["Getting started", "Authentication", "Webhooks"];

function expandLiquidForPreview(html) {
  if (!html.includes("{%")) return html;
  let out = html;

  /* inner loop: guide categories (global — same sample list for every card) */
  out = out.replace(/\{%-?\s*for category in child\.guides[^%]*%\}([\s\S]*?)\{%-?\s*endfor\s*-?%\}/g, (_, inner) =>
    SAMPLE_CATEGORIES.map((cat) => inner.replace(/\{\{\s*category\.title\s*\}\}/g, cat)).join("")
  );

  /* outer loops: child projects — each loop carries its own `modulo: N` */
  out = out.replace(/\{%-?\s*for child in parentProject\.childrenProjects\s*-?%\}([\s\S]*?)\{%-?\s*endfor\s*-?%\}/g, (_, block) => {
    const nm = block.match(/modulo:\s*(\d+)/);
    const N = nm ? Math.max(1, parseInt(nm[1], 10)) : 3;
    const body = block.replace(/\{%-?\s*assign[^%]*%\}\n?/g, "");
    return SAMPLE_PROJECTS.map((p, i) =>
      body
        .replace(/\{%\s*if forloop\.index < 10\s*%\}0\{%\s*endif\s*%\}/g, "0")
        .replace(/\{\{\s*forloop\.index0\s*\}\}/g, String(i))
        .replace(/\{\{\s*forloop\.index\s*\}\}/g, String(i + 1))
        .replace(/\{\{\s*ai\s*\}\}/g, String(i % N))
        .replace(/\{\{\s*child\.name\s*\}\}/g, p.name)
        .replace(/\{\{\s*child\.subpath\s*\}\}/g, p.subpath)
        .replace(/\{\{\s*child\.description[^}]*\}\}/g, p.desc)
    ).join("\n");
  });

  /* parent tokens + anything left over */
  out = out
    .replace(/\{\{\s*parentProject\.name\s*\}\}/g, "Benak Group")
    .replace(/\{\{\s*parentProject\.description[^}]*\}\}/g, "All product documentation in one place.");
  return out;
}

/* ---------- small reusable inputs ---------- */
function Field({ label, children }) {
  return (
    <div className="glp-field">
      <label>{label}</label>
      {children}
    </div>
  );
}

function Seg({ value, options, onChange }) {
  return (
    <div className="glp-seg">
      {options.map((o) => (
        <button key={o.value} className={value === o.value ? "on" : ""} onClick={() => onChange(o.value)} type="button">
          {o.label}
        </button>
      ))}
    </div>
  );
}

function Slider({ label, value, min, max, step = 1, unit = "px", onChange }) {
  /* local text state lets the number field be edited freely (incl. temporarily
     empty, or values beyond the slider's range) without fighting the value */
  const [txt, setTxt] = useState(String(value));
  useEffect(() => { setTxt(String(value)); }, [value]);
  return (
    <Field label={label}>
      <div className="glp-slider">
        <input type="range" min={min} max={max} step={step} value={value} onChange={(e) => onChange(Number(e.target.value))} />
        <input
          type="number"
          className="glp-numin"
          min={min}
          step={step}
          value={txt}
          onChange={(e) => {
            setTxt(e.target.value);
            const n = Number(e.target.value);
            if (e.target.value !== "" && Number.isFinite(n) && n >= 0) onChange(n);
          }}
          onBlur={() => { if (txt === "" || !Number.isFinite(Number(txt))) setTxt(String(value)); }}
        />
        {unit ? <span className="glp-numunit">{unit}</span> : null}
      </div>
    </Field>
  );
}

function StyleCheck({ checked, label, onChange }) {
  return (
    <label className="glp-check">
      <input type="checkbox" checked={checked} onChange={(e) => onChange(e.target.checked)} />
      {label}
    </label>
  );
}

/* normalize loose hex entry (#abc, abc123, #ABC123) to #rrggbb, or null if invalid */
function normHex(v) {
  let s = String(v || "").trim().replace(/^#/, "");
  if (/^[0-9a-fA-F]{3}$/.test(s)) s = s.split("").map((c) => c + c).join("");
  return /^[0-9a-fA-F]{6}$/.test(s) ? "#" + s.toLowerCase() : null;
}

/* WCAG relative-luminance contrast ratio between two #rrggbb colors */
function relLum(hex) {
  const h = normHex(hex);
  if (!h) return null;
  const ch = [1, 3, 5].map((i) => {
    let v = parseInt(h.slice(i, i + 2), 16) / 255;
    return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  });
  return 0.2126 * ch[0] + 0.7152 * ch[1] + 0.0722 * ch[2];
}
function contrastRatio(a, b) {
  const la = relLum(a), lb = relLum(b);
  if (la == null || lb == null) return null;
  const hi = Math.max(la, lb), lo = Math.min(la, lb);
  return (hi + 0.05) / (lo + 0.05);
}
/* the card surface each accent sits on, per mode (matches the generated theme) */
const CARD_SURFACE = { light: "#ffffff", dark: "#151a21" };
/* readout for one accent vs its surface — 3:1 is WCAG AA for large/bold text & UI */
function ContrastNote({ color, surface, label }) {
  const r = contrastRatio(color, surface);
  if (r == null) return null;
  const ok = r >= 3;
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 4, color: ok ? "var(--ink-3)" : "#E3B168" }}>
      {label} {r.toFixed(1)}:1 {ok ? "✓" : "⚠"}
    </span>
  );
}

/* hex-first color input: type a hex code (primary), or nudge with the swatch picker */
function HexColor({ value, onChange }) {
  const [txt, setTxt] = useState(value);
  useEffect(() => { setTxt(value); }, [value]);
  const valid = normHex(txt);
  return (
    <div className="glp-hex">
      <span className="glp-hex__sw" style={{ background: valid || value }} />
      <input
        className="glp-input glp-hex__txt"
        value={txt}
        spellCheck={false}
        placeholder="#0B63C5"
        onChange={(e) => { setTxt(e.target.value); const h = normHex(e.target.value); if (h) onChange(h); }}
        onBlur={() => setTxt(value)}
      />
      <input type="color" className="glp-hex__pick" value={normHex(value) || "#000000"} onChange={(e) => onChange(e.target.value)} title="Pick a color" />
    </div>
  );
}

/* icon input — emoji character or a Font Awesome icon name + style */
function IconField({ label, obj, onChange }) {
  const type = obj.iconType || "emoji";
  return (
    <Field label={label}>
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        <Seg
          value={type}
          onChange={(v) => onChange({ iconType: v })}
          options={[
            { value: "emoji", label: "Emoji" },
            { value: "fa", label: "Font Awesome" },
          ]}
        />
        {type === "emoji" ? (
          <input className="glp-input" style={{ width: 80 }} value={obj.icon} onChange={(e) => onChange({ icon: e.target.value })} />
        ) : (
          <>
            <input
              className="glp-input"
              style={{ flex: 1, minWidth: 110 }}
              value={obj.icon}
              onChange={(e) => onChange({ icon: e.target.value })}
              placeholder="e.g. rocket, book-open"
            />
            <select className="glp-select" style={{ width: 104 }} value={obj.faStyle || "solid"} onChange={(e) => onChange({ faStyle: e.target.value })}>
              <option value="solid">Solid</option>
              <option value="regular">Regular</option>
              <option value="light">Light</option>
              <option value="brands">Brands</option>
            </select>
          </>
        )}
      </div>
      {type === "emoji" && (
        <div className="glp-emojis">
          {EMOJI_COMMON.map((e) => (
            <button key={e} type="button" className={"glp-emoji" + (obj.icon === e ? " on" : "")} onClick={() => onChange({ icon: e })}>
              {e}
            </button>
          ))}
        </div>
      )}
      {type === "fa" && (
        <>
          <div className="glp-fagrid">
            {FA_COMMON.map((n) => (
              <button key={n} type="button" title={n} className={"glp-faicon" + (obj.icon === n ? " on" : "")} onClick={() => onChange({ icon: n })}>
                <i className={"fa-" + (obj.faStyle || "solid") + " fa-" + n} aria-hidden="true"></i>
              </button>
            ))}
          </div>
          <div style={{ fontSize: 11, color: "var(--ink-3)", marginTop: 6, lineHeight: 1.45 }}>
            Or type any Font Awesome name (without the <code>fa-</code> prefix). Light &amp; duotone are Pro-only and may not show in the preview.
          </div>
        </>
      )}
    </Field>
  );
}

/* ---------- accent swatch row (single or multi select) ---------- */
function AccentSwatches({ selected, onSelect, multi = false, customCard = null, onCustom = null }) {
  return (
    <>
      <div className="glp-swatches">
        {Object.entries(ACCENTS).map(([key, a]) => {
          const on = multi ? selected.includes(key) : selected === key;
          return (
            <button
              key={key}
              type="button"
              title={a.label}
              className={"glp-swatch" + (on ? " on" : "")}
              style={{ background: `linear-gradient(135deg, ${a.light} 50%, ${a.dark} 50%)` }}
              onClick={() => onSelect(key)}
            />
          );
        })}
        {!multi && onCustom && (
          <button
            type="button"
            title="Custom"
            className={"glp-swatch glp-swatch--custom" + (selected === "custom" ? " on" : "")}
            onClick={() => onSelect("custom")}
          >
            custom
          </button>
        )}
      </div>
      {!multi && selected === "custom" && customCard && (
        <div className="glp-custom-pair">
          <div className="glp-hexrow">
            <span>Light</span>
            <HexColor value={customCard.customLight} onChange={(v) => onCustom({ customLight: v })} />
          </div>
          <div className="glp-hexrow">
            <span>Dark</span>
            <HexColor value={customCard.customDark} onChange={(v) => onCustom({ customDark: v })} />
          </div>
          <div style={{ display: "flex", gap: 14, flexWrap: "wrap", fontSize: 11, fontFamily: "'Space Mono', monospace" }}>
            <ContrastNote label="Light" color={customCard.customLight} surface={CARD_SURFACE.light} />
            <ContrastNote label="Dark" color={customCard.customDark} surface={CARD_SURFACE.dark} />
          </div>
          <div style={{ fontSize: 11, color: "var(--ink-3)", lineHeight: 1.4 }}>Contrast vs the card background — aim for 3:1+ so text and buttons stay legible. Use a brighter shade for dark mode.</div>
        </div>
      )}
    </>
  );
}

/* ---------- card editor ---------- */
function CardEditor({ card, index, count, style, hideAccents, open, onToggle, onChange, onMove, onRemove, onDuplicate }) {
  const acc = cardAccent(card);
  const set = (patch) => onChange({ ...card, ...patch });
  const setPeek = (i, val) => {
    const items = [...card.peekItems];
    items[i] = val;
    set({ peekItems: items });
  };
  return (
    <div className="glp-card">
      <div className="glp-card__head" onClick={onToggle}>
        <span className="glp-card__swatch" style={{ background: acc.light }} />
        <span className="glp-card__name">{card.title || "Untitled card"}</span>
        <span className="glp-card__meta">{card.href}</span>
        <button className="glp-iconbtn" title="Move up" disabled={index === 0}
          onClick={(e) => { e.stopPropagation(); onMove(-1); }} type="button">&#8593;</button>
        <button className="glp-iconbtn" title="Move down" disabled={index === count - 1}
          onClick={(e) => { e.stopPropagation(); onMove(1); }} type="button">&#8595;</button>
        <button className="glp-iconbtn" title="Duplicate card" disabled={count >= 12}
          onClick={(e) => { e.stopPropagation(); onDuplicate(); }} type="button">&#10697;</button>
        <button className="glp-iconbtn" title="Delete card" disabled={count === 1}
          onClick={(e) => { e.stopPropagation(); onRemove(); }} type="button">&#10005;</button>
        <span className="glp-iconbtn" style={{ transform: open ? "rotate(90deg)" : "none", transition: "transform 150ms" }}>&#8250;</span>
      </div>
      {open && (
        <div className="glp-card__body">
          <div className="glp-row2">
            <Field label="Card title">
              <input className="glp-input" value={card.title} onChange={(e) => set({ title: e.target.value })} />
            </Field>
            <Field label="Links to (path)">
              <input className="glp-input" value={card.href} onChange={(e) => set({ href: normPath(e.target.value) })} placeholder="my-project" />
            </Field>
          </div>
          <Field label="Description">
            <textarea className="glp-textarea" value={card.blurb} onChange={(e) => set({ blurb: e.target.value })} />
          </Field>

          {style.icon && <IconField label="Icon" obj={card} onChange={set} />}
          {style.badge && (
            <div className="glp-row2">
              <Field label="Badge text">
                <input className="glp-input" value={card.eyebrow} onChange={(e) => set({ eyebrow: e.target.value })} />
              </Field>
              {style.badge && (
                <Field label="Badge icon">
                  <Seg
                    value={card.badge}
                    onChange={(v) => set({ badge: v })}
                    options={[
                      { value: "dot", label: "● Open" },
                      { value: "lock", label: "🔒 Locked" },
                    ]}
                  />
                </Field>
              )}
            </div>
          )}

          {!hideAccents && (
            <Field label="Accent color">
              <AccentSwatches selected={card.accent} onSelect={(k) => set({ accent: k })} customCard={card} onCustom={set} />
            </Field>
          )}

          {style.cta && !style.ctaPlain && (
            <div className="glp-row2">
              <Field label="Button text">
                <input className="glp-input" value={card.ctaText} onChange={(e) => set({ ctaText: e.target.value })} />
              </Field>
              <Field label="Button style">
                <Seg
                  value={card.ctaStyle}
                  onChange={(v) => set({ ctaStyle: v })}
                  options={[
                    { value: "filled", label: "Filled" },
                    { value: "ghost", label: "Outlined" },
                  ]}
                />
              </Field>
            </div>
          )}
          {style.cta && style.ctaPlain && (
            <Field label="Link text (e.g. Open Folder)">
              <input className="glp-input" value={card.ctaText} onChange={(e) => set({ ctaText: e.target.value })} />
            </Field>
          )}

          <label className="glp-toggle">
            <input type="checkbox" checked={card.primary} onChange={(e) => set({ primary: e.target.checked })} />
            <span className="glp-toggle__text">
              <b>Highlight as the primary card</b>
              <span>Adds an accent-tinted border so this card reads as the main path.</span>
            </span>
          </label>

          {style.peek && (
            <>
              <Field label="List heading (e.g. Popular, Inside)">
                <input className="glp-input" value={card.peekLabel} onChange={(e) => set({ peekLabel: e.target.value })} />
              </Field>
              <Field label="List items (leave blank to hide)">
                {card.peekItems.map((p, i) => (
                  <div className="glp-peekitem" key={i}>
                    <input className="glp-input" value={p} onChange={(e) => setPeek(i, e.target.value)} />
                    <button
                      className="glp-iconbtn"
                      type="button"
                      title="Remove item"
                      onClick={() => set({ peekItems: card.peekItems.filter((_, j) => j !== i) })}
                    >
                      &#10005;
                    </button>
                  </div>
                ))}
                {card.peekItems.length < 5 && (
                  <button className="glp-add glp-add--sm" type="button" onClick={() => set({ peekItems: [...card.peekItems, ""] })}>
                    + Add list item

              <label className="glp-toggle" style={{ paddingTop: 0 }}>
                <input type="checkbox" checked={card.peekArrows} onChange={(e) => set({ peekArrows: e.target.checked })} />
                <span className="glp-toggle__text">
                  <b>Arrow bullets</b>
                  <span>Show a small → in the accent color before each list item.</span>
                </span>
              </label>
            </>
          )}
        </div>
      )}
    </div>
  );
}
