/* ---------------- helpers ---------------- */
const esc = (s = "") =>
  String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");

const cardAccent = (card) =>
  card.accent === "custom"
    ? { light: card.customLight, dark: card.customDark }
    : { light: ACCENTS[card.accent].light, dark: ACCENTS[card.accent].dark };

/* auto-prepend "/" to link paths (leaves full URLs and #anchors alone) */
const normPath = (v) => (!v || /^[/#]/.test(v) || /^https?:/i.test(v) ? v : "/" + v);

const encodeConfig = (cfg) => btoa(unescape(encodeURIComponent(JSON.stringify(cfg))));
const decodeConfig = (s) => JSON.parse(decodeURIComponent(escape(atob(s))));

/* merge a (possibly older/partial) shared config over the defaults */
function migrateConfig(loaded) {
  const D = DEFAULT_CONFIG;
  return {
    ...D,
    ...loaded,
    hero: { ...D.hero, ...(loaded.hero || {}) },
    ticker: { ...D.ticker, ...(loaded.ticker || {}) },
    section: { ...D.section, ...(loaded.section || {}) },
    layout: { ...D.layout, ...(loaded.layout || {}) },
    banner: { ...D.banner, ...(loaded.banner || {}) },
    liquid: { ...D.liquid, ...(loaded.liquid || {}) },
    cards: (loaded.cards && loaded.cards.length ? loaded.cards : D.cards).map((c) => ({
      ...CARD_DEFAULTS,
      ...c,
      id: c.id || uid(),
    })),
  };
}

/* ============================================================
   HTML GENERATOR
   ============================================================ */

  const T = cfg.template;
  const S = TSPEC[T];
  const F = FONTS[cfg.fonts];
  const L = cfg.layout;
  const liquid = cfg.liquid.enabled;

  /* accent palette: static cards, or the liquid accent cycle */
  const palette = liquid
    ? cfg.liquid.accents.map((k) => ACCENTS[k] || ACCENTS.green)
    : cfg.cards.map((c) => cardAccent(c));
  const N = palette.length;

  const lightAccents = palette.map((a, i) => `    --bnk-a${i}: ${a.light};`).join("\n");
  const darkAccents = (pad) => palette.map((a, i) => `${pad}--bnk-a${i}: ${a.dark};`).join("\n");
  const accentRules = palette.map((_, i) => `  .bnk-card--a${i} { --accent: var(--bnk-a${i}); }`).join("\n");

  const heroLeft = cfg.hero.align === "left";

  /* ---------- optional CSS blocks ---------- */

    ? `

    background-color: transparent !important;
    box-shadow: none !important;
  }

  .rm-Header-top { border-bottom: 0 !important; }
`
    : "";

  const actionsCSS = cfg.moveSearch
    ? `
  /* ===== Search + Ask AI row (relocated from the header) ===== */
  .bnk-actions {
    display: flex;
    justify-content: ${heroLeft ? "flex-start" : "center"};

  }

    display: flex !important;
    align-items: stretch !important;
    height: auto !important;
    width: auto !important;
    flex: 0 1 380px;

  }

    : "";

  /* archive hero styling override */
  const archiveHeroCSS =

${peekCSS}
  .bnk-card__go {

  } else if (T === "solutions" || T === "bento") {

  .bnk-card {

    position: relative; display: flex; flex-direction: column;
    ${minH}
    padding: 26px 26px 24px; overflow: hidden;

  }
${barCSS}
${accentRules}
  .bnk-card--primary { border-color: color-mix(in srgb, var(--accent) 38%, var(--card-border)) !important; }

  .bnk-card__icon {

${peekCSS}
  .bnk-card__go {

  .bnk-card__go--ghost:hover { border-color: color-mix(in srgb, var(--accent) 65%, transparent); }
${hoverCSS}`;
  } else if (T === "launchpad") {
    cardCSS = `
  .bnk-card {
    --accent: var(--bnk-ink-2);
    position: relative; display: flex; flex-direction: column;
    ${minH}
    padding: 26px 26px 24px; overflow: hidden;

  }
${barCSS}
${accentRules}
  .bnk-card--primary { border-color: color-mix(in srgb, var(--accent) 38%, var(--card-border)) !important; }

  .bnk-card__num {
    display: block;
    font-family: ${F.mono};

    font-weight: 700;

  }
  .bnk-card__title { margin: 0 0 8px; font-family: ${F.display}; font-weight: 600; font-size: 20px; letter-spacing: -0.01em; color: var(--card-title) !important; }
  .bnk-card__blurb { font-size: 13.5px; line-height: 1.55; color: var(--bnk-ink-1) !important; }
${peekCSS}
  .bnk-card__go {
    display: inline-flex; align-items: center; gap: 8px; align-self: flex-start; margin-top: auto;
    font-family: ${F.mono}; font-size: 13.5px; letter-spacing: 0.05em;

  .bnk-card__go:hover .rm-arrow { transform: translateX(4px); }
  .bnk-card__go--ghost:hover { border-color: color-mix(in srgb, var(--accent) 65%, transparent); }
${hoverCSS}`;
  } else if (T === "helpcenter") {
    cardCSS = `
  .bnk-card {
    --accent: var(--bnk-ink-2);
    position: relative; display: flex; flex-direction: column;
    ${minH}
    padding: 19px 20px 18px; overflow: hidden; text-decoration: none;
    transition: transform 200ms ease, border-color 200ms ease, background-color 200ms ease;
  }
${accentRules}
  .bnk-card--primary { border-color: color-mix(in srgb, var(--accent) 38%, var(--card-border)) !important; }

  .bnk-card__title {
    margin: 0 0 6px;

  .bnk-card:hover .bnk-card__title { color: var(--accent) !important; }

${hoverCSS}`;
  } else if (T === "tiles") {
    cardCSS = `
  .bnk-card {
    --accent: var(--bnk-ink-2);
    position: relative; display: flex; flex-direction: column;
    ${minH}
    padding: 20px 20px 18px; overflow: hidden; text-decoration: none;
    transition: transform 200ms ease, border-color 200ms ease, background-color 200ms ease;
  }
${barCSS}
${accentRules}
  .bnk-card--primary { border-color: color-mix(in srgb, var(--accent) 38%, var(--card-border)) !important; }

  .bnk-card__eyebrow {
    display: inline-flex; align-items: center; gap: 7px; align-self: flex-start;
    font-family: ${F.mono}; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--accent) !important;
    margin-bottom: 12px;
  }
  .bnk-dot { width: 6px; height: 6px; flex: none; border-radius: 50%; background: var(--accent); }
  .bnk-lock { width: 10px; height: 10px; flex: none; display: inline-block; }

  .bnk-card__title { margin: 0 0 6px; font-family: ${F.display}; font-weight: 600; font-size: 18px; letter-spacing: -0.01em; }
  .bnk-card__blurb { font-size: 13px; line-height: 1.5; color: var(--bnk-ink-1) !important; }
  .bnk-card .rm-arrow { margin-top: auto; padding-top: 14px; align-self: flex-end; color: var(--accent) !important; font-size: 16px; }
${hoverCSS}`;
  } else {
    /* archive */
    cardCSS = `
  .bnk-card {
    --accent: var(--bnk-ink-2);
    position: relative; display: flex; flex-direction: column;
    ${minH}
    padding: 22px 22px 20px; overflow: hidden; text-decoration: none;
    transition: transform 200ms ease, border-color 200ms ease, background-color 200ms ease;
  }
${barCSS}
${accentRules}
  .bnk-card--primary { border-color: color-mix(in srgb, var(--accent) 38%, var(--card-border)) !important; }

  .bnk-card__eyebrow {
    display: block;
    font-family: ${F.mono};
    font-size: 10.5px;
    letter-spacing: 0.1em;
    color: var(--accent) !important;
    margin-bottom: 14px;
  }
  .bnk-card__title {
    margin: 0 0 8px;
    font-family: ${F.mono};

    font-size: 16px;
    text-transform: uppercase;

    color: var(--card-title) !important;
  }
  .bnk-card__blurb { font-size: 13px; line-height: 1.55; color: var(--bnk-ink-1) !important; }
  .bnk-card__go {
    display: inline-flex; align-items: center; gap: 8px; align-self: flex-start; margin-top: auto;
    padding-top: 16px;
    font-family: ${F.mono}; font-size: 12.5px; letter-spacing: 0.05em;
    color: var(--accent) !important;
  }
${hoverCSS}`;
  }

  /* ---------- grid ---------- */
  const gridCSS =
    T === "bento"
      ? `
  .bnk-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: ${L.gap}px;${cfg.moveSearch ? "" : "\n    margin-top: 40px;"}
  }
  .bnk-grid > *:nth-child(4n+1) { grid-column: span 4; }
  .bnk-grid > *:nth-child(4n+2) { grid-column: span 2; }
  .bnk-grid > *:nth-child(4n+3) { grid-column: span 2; }
  .bnk-grid > *:nth-child(4n)   { grid-column: span 4; }
  @media (max-width: 760px) {
    .bnk-grid > * { grid-column: 1 / -1 !important; }
  }
`
      : `
  .bnk-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(${L.colMin}px, 1fr));
    gap: ${L.gap}px;${cfg.moveSearch ? "" : "\n    margin-top: 40px;"}
  }
`;

  /* ============================================================
     Card markup builder — used for both static cards and the
     Liquid loop (vars are either literal strings or Liquid tags)
     ============================================================ */
  function buildCard(v) {
    /* v: { accentClass, primary, href, eyebrow, badgeHtml, icon, num, fileLabel,
            title, blurb, peekHtml, ctaText, ctaStyle, comment }             */
    const primaryCls = v.primary ? " bnk-card--primary" : "";
    const openTag = S.anchor
      ? `<a class="bnk-card ${v.accentClass}${primaryCls}" href="${v.href}"\n       ${inlineCardStyle}>`
      : `<div class="bnk-card ${v.accentClass}${primaryCls}"\n       ${inlineCardStyle}>`;
    const closeTag = S.anchor ? "</a>" : "</div>";

    let inner = "";
    if (S.file) inner += `\n      <span class="bnk-card__eyebrow">${v.fileLabel}</span>`;
    else if (S.badge) inner += `\n      <span class="bnk-card__eyebrow">${v.badgeHtml}${v.eyebrow}</span>`;
    if (S.num) inner += `\n      <span class="bnk-card__num">${v.num}</span>`;
    if (S.icon) inner += `\n      <span class="bnk-card__icon" aria-hidden="true">${v.icon}</span>`;
    inner += `\n      <span class="bnk-card__title"${T === "audience" || T === "tiles" ? ' style="color: var(--card-title) !important;"' : ""}>${v.title}</span>`;
    inner += `\n      <span class="bnk-card__blurb">${v.blurb}</span>`;
    if (S.peek && v.peekHtml) inner += `\n${v.peekHtml}`;
    if (S.cta) {
      const ctaCls = S.ctaPlain ? "bnk-card__go" : `bnk-card__go bnk-card__go--${v.ctaStyle === "filled" ? "filled" : "ghost"}`;
      inner += S.anchor
        ? `\n      <span class="${ctaCls}">${v.ctaText}<span class="rm-arrow" aria-hidden="true">&#8594;</span></span>`
        : `\n      <a class="${ctaCls}" href="${v.href}">${v.ctaText}<span class="rm-arrow" aria-hidden="true">&#8594;</span></a>`;
    }
    if (T === "tiles") inner += `\n      <span class="rm-arrow" aria-hidden="true">&#8594;</span>`;

    return `    <!-- ${v.comment} -->\n    ${openTag}${inner}\n    ${closeTag}`;
  }

  function staticPeek(c) {
    const items = c.peekItems.filter((p) => p.trim());
    if (!items.length) return "";
    return `      <span class="bnk-card__peek">
        <span class="bnk-card__peek-label">${esc(c.peekLabel)}</span>
${items
  .map((p) => `        <span class="bnk-card__peek-item">${c.peekArrows ? '<span class="bnk-tick">&#8594;</span>' : ""}${esc(p)}</span>`)
  .join("\n")}
      </span>`;
  }

  /* ---------- cards: static or Liquid ---------- */
  let cardsBlock;
  if (!liquid) {
    cardsBlock = cfg.cards
      .map((c, i) =>
        buildCard({
          accentClass: `bnk-card--a${i}`,
          primary: c.primary,
          href: esc(c.href),
          eyebrow: esc(c.eyebrow),
          badgeHtml: c.badge === "lock" ? LOCK_SVG : '<span class="bnk-dot"></span>',
          icon: esc(c.icon),
          num: String(i + 1).padStart(2, "0"),
          fileLabel: `File_${String(i + 1).padStart(2, "0")}${c.eyebrow.trim() ? " // " + esc(c.eyebrow) : ""}`,
          title: esc(c.title),
          blurb: esc(c.blurb),
          peekHtml: staticPeek(c),
          ctaText: esc(c.ctaText),
          ctaStyle: c.ctaStyle,
          comment: `Card ${i + 1} — ${esc(c.title)}`,
        })
      )
      .join("\n\n");
  } else {
    const Q = cfg.liquid;
    const liquidPeek = Q.peek
      ? `      <span class="bnk-card__peek">
        <span class="bnk-card__peek-label">${esc(Q.peekLabel)}</span>
        {% for category in child.guides limit: ${Q.peekCount} %}
        <span class="bnk-card__peek-item">{{ category.title }}</span>
        {% endfor %}
      </span>`
      : "";
    const inner = buildCard({
      accentClass: "bnk-card--a{{ ai }}",
      primary: false,
      href: "/{{ child.subpath }}",
      eyebrow: esc(Q.eyebrow),
      badgeHtml: Q.badge === "lock" ? LOCK_SVG : '<span class="bnk-dot"></span>',
      icon: esc(Q.icon),
      num: "{% if forloop.index < 10 %}0{% endif %}{{ forloop.index }}",
      fileLabel: `File_{% if forloop.index < 10 %}0{% endif %}{{ forloop.index }}${Q.eyebrow.trim() ? " // " + esc(Q.eyebrow) : ""}`,
      title: "{{ child.name }}",
      blurb: `{{ child.description | default: "${esc(Q.blurbFallback)}" }}`,
      peekHtml: liquidPeek,
      ctaText: esc(Q.ctaText),
      ctaStyle: Q.ctaStyle,
      comment: "One card per child project (Liquid)",
    });
    cardsBlock = `    {% for child in parentProject.childrenProjects %}
    {% assign ai = forloop.index0 | modulo: ${N} %}
${inner}
    {% endfor %}`;
  }

  /* ---------- optional markup blocks ---------- */
  const tickerMarkup = cfg.ticker.enabled
    ? (() => {
        const half = (esc(cfg.ticker.text) + " &bull; ").repeat(4);
        return `  <div class="bnk-ticker" aria-hidden="true"><span class="bnk-ticker__inner">${half}${half}</span></div>\n`;
      })()
    : "";
  const heroEyebrow = cfg.hero.eyebrow.trim() ? `    <p class="bnk-hero__eyebrow">${esc(cfg.hero.eyebrow)}</p>\n` : "";
  const heroChip = cfg.hero.chip.trim()
    ? cfg.hero.chipHref.trim()
      ? `    <a class="bnk-hero__chip" href="${esc(cfg.hero.chipHref)}">${esc(cfg.hero.chip)} <span class="rm-arrow" aria-hidden="true">&#8594;</span></a>\n`
      : `    <span class="bnk-hero__chip">${esc(cfg.hero.chip)}</span>\n`
    : "";
  const heroButtons = cfg.hero.buttons
    ? `    <div class="bnk-hero__btns">
      <a class="bnk-btn bnk-btn--primary" href="${esc(cfg.hero.btnPrimary.href)}">${esc(cfg.hero.btnPrimary.label)}</a>
      <a class="bnk-btn bnk-btn--secondary" href="${esc(cfg.hero.btnSecondary.href)}">${esc(cfg.hero.btnSecondary.label)}</a>
    </div>\n`
    : "";
  const sectionMarkup =
    cfg.section.title.trim() || cfg.section.text.trim()
      ? `\n  <div class="bnk-section">
${cfg.section.title.trim() ? `    <h2 class="bnk-section__title">${esc(cfg.section.title)}</h2>\n` : ""}${
          cfg.section.text.trim() ? `    <p class="bnk-section__text">${esc(cfg.section.text)}</p>\n` : ""
        }  </div>\n`
      : "";
  const bannerMarkup = cfg.banner.enabled
    ? `\n  <div class="bnk-banner">
    <div class="bnk-banner__copy">
      <h2 class="bnk-banner__title">${esc(cfg.banner.title)}</h2>
      <p class="bnk-banner__text">${esc(cfg.banner.text)}</p>
    </div>
    <a class="bnk-banner__btn" href="${esc(cfg.banner.btnHref)}">${esc(cfg.banner.btnLabel)}<span class="rm-arrow" aria-hidden="true">&#8594;</span></a>
  </div>\n`
    : "";

  const script = cfg.moveSearch
    ? `
<script>
  /* Theming is handled entirely in CSS above. This script only relocates
     ReadMe's native search + Ask AI controls into the hero row. */
  (function () {
    function placeActions() {
      var actions = document.getElementById("rm-actions");
      if (!actions) return;
      var search = document.querySelector(".rm-Header-search");
      var askai = document.querySelector(".rm-AskAi");
      if (search && search.parentElement !== actions) actions.appendChild(search);
      if (askai && askai.parentElement !== actions) actions.appendChild(askai);
    }
    placeActions();
    if (document.body) {
      new MutationObserver(placeActions).observe(document.body, { childList: true, subtree: true });
    }
  })();
<\/script>`
    : "";

  return `<!--
  Global Landing Page — generated with GLP Builder
  Template: ${TEMPLATES[T].label} · Fonts: ${FONTS[cfg.fonts].label}${liquid ? " · Cards: Liquid (auto from child projects)" : ""}
  Paste into: dash.readme.io → your group → Global Landing Page
${
  liquid
    ? `
  Liquid: cards render one-per-child-project using ReadMe's templating
  (see docs.readme.com/ent/docs/creating-a-global-landing-page). Properties
  used: parentProject.childrenProjects, child.name, child.subpath,
  child.description, child.guides (categories) → category.title.
`
    : ""
}
  Theming: ReadMe's NATIVE dark-mode selectors, no JS theming.
    - Light / default : base .bnk-landing variables
    - Explicit dark   : [data-color-mode="dark"] .bnk-landing
    - Same-as-system  : @media (prefers-color-scheme: dark) + [data-color-mode="system"]
-->
<style>
  @import url('${F.importUrl}');
${headerCSS}
  /* ===== GLOBAL THEME MAP — LIGHT / DEFAULT ===== */
  .bnk-landing {
    --bnk-ink-1: #52525B;
    --bnk-ink-2: #71717A;
    --bnk-heading: #18181B;

    /* Accent cycle (light) */
${lightAccents}

    /* Filled CTA foreground */
    --bnk-cta-on: #FFFFFF;

    --card-bg: #FFFFFF;
    --card-border: #E4E4E7;
    --card-title: #18181B;
    --card-divider: #EEEEF0;
    --card-shadow: 0 1px 2px rgba(0,0,0,.04), 0 10px 30px rgba(0,0,0,.07);
    --card-blur: none;

    box-sizing: border-box;
    max-width: ${L.maxW}px;
    margin: 0 auto;
    padding: 20px 48px 36px;
    background: transparent;
    font-family: ${F.body};
    color: var(--bnk-ink-1);
    -webkit-font-smoothing: antialiased;
  }

  /* ===== DARK MODE — via ReadMe's native data-color-mode signal ===== */
  [data-color-mode="dark"] .bnk-landing {
    --bnk-ink-1: #A1A1AA;
    --bnk-ink-2: #8E8E96;
    --bnk-heading: #ECEFF4;

${darkAccents("      ")}
    --bnk-cta-on: #0B0F14;

    --card-bg: rgba(255, 255, 255, 0.028);
    --card-border: rgba(255, 255, 255, 0.09);
    --card-title: #ECEFF4;
    --card-divider: rgba(255, 255, 255, 0.08);
    --card-shadow: none;
    --card-blur: blur(9px) saturate(118%);
  }
  @media (prefers-color-scheme: dark) {
    [data-color-mode="system"] .bnk-landing {
      --bnk-ink-1: #A1A1AA;
      --bnk-ink-2: #8E8E96;
      --bnk-heading: #ECEFF4;

${darkAccents("        ")}
      --bnk-cta-on: #0B0F14;

      --card-bg: rgba(255, 255, 255, 0.028);
      --card-border: rgba(255, 255, 255, 0.09);
      --card-title: #ECEFF4;
      --card-divider: rgba(255, 255, 255, 0.08);
      --card-shadow: none;
      --card-blur: blur(9px) saturate(118%);
    }
  }

  .bnk-landing *,
  .bnk-landing *::before { box-sizing: border-box; }
${tickerCSS}
  /* ===== Hero ===== */
  .bnk-hero {
    text-align: ${heroLeft ? "left" : "center"};
    margin: 34px ${heroLeft ? "0" : "auto"} 0;
    max-width: ${heroLeft ? "720px" : "640px"};
  }
  .bnk-hero__eyebrow {
    margin: 0 0 14px;
    font-family: ${F.mono};
    font-size: 11.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--bnk-ink-2) !important;
  }
${chipCSS}
  .bnk-hero__title {
    margin: 0 0 20px;
    font-family: ${F.display};
    font-weight: 600;
    font-size: ${heroLeft ? "42px" : "38px"};
    letter-spacing: -0.01em;
    color: var(--bnk-heading) !important;
  }
  .bnk-hero__sub { margin: 0; font-size: 14.5px; line-height: 1.5; color: var(--bnk-ink-2) !important; }
${archiveHeroCSS}${heroButtonsCSS}${actionsCSS}${sectionCSS}${gridCSS}${cardCSS}
  .rm-arrow { display: inline-block; transition: transform 200ms ease; }
${bannerCSS}
  /* ===== Footer ===== */
  .bnk-footer { text-align: center; margin: 34px 0 0; font-size: 13px; color: var(--bnk-ink-2) !important; }
  .bnk-footer a { color: var(--bnk-ink-1) !important; text-decoration: underline; text-underline-offset: 3px; }

  @media (prefers-reduced-motion: reduce) {
    .bnk-card, .bnk-card::before, .bnk-dot, .bnk-card__go, .rm-arrow, .bnk-btn, .bnk-banner__btn { transition: none; }
    .bnk-card:hover { transform: none; }
    .bnk-card:hover .rm-arrow { transform: none; }
    .bnk-ticker__inner { animation: none; }
  }
</style>

<div class="bnk-landing" id="rm-root">
${tickerMarkup}  <div class="bnk-hero">
${heroEyebrow}${heroChip}    <h1 class="bnk-hero__title">${esc(cfg.hero.title)}</h1>
    <p class="bnk-hero__sub">${esc(cfg.hero.subtitle)}</p>
${heroButtons}  </div>
${cfg.moveSearch ? '\n  <div class="bnk-actions" id="rm-actions"></div>\n' : ""}${sectionMarkup}
  <div class="bnk-grid">
${cardsBlock}
  </div>
${bannerMarkup}${cfg.footer.trim() ? `\n  <p class="bnk-footer">${esc(cfg.footer)}</p>` : ""}
</div>
${script}
`;

/* ============================================================
   NAIVE LIQUID EXPANSION — for the live preview only.
   ReadMe renders the real Liquid server-side; here we substitute
   three sample child projects so the preview looks real.
   ============================================================ */
const SAMPLE_PROJECTS = [
  { name: "Payments API", subpath: "payments", desc: "Accept payments, manage refunds, and reconcile settlements." },
  { name: "Identity", subpath: "identity", desc: "SSO, MFA, and user permission management for your apps." },
  { name: "Client SDKs", subpath: "sdks", desc: "Official libraries for Node, Python, Go, and React Native." },
];
const SAMPLE_CATEGORIES = ["Getting started", "Authentication", "Webhooks"];

function expandLiquidForPreview(html) {
  if (!html.includes("{%")) return html;
  let out = html;

  /* inner loop: guide categories */
  out = out.replace(/\{%-?\s*for category in child\.guides[^%]*%\}([\s\S]*?)\{%-?\s*endfor\s*-?%\}/g, (_, inner) =>
    SAMPLE_CATEGORIES.map((cat) => inner.replace(/\{\{\s*category\.title\s*\}\}/g, cat)).join("")
  );

  /* accent cycle length */
  const nm = out.match(/modulo:\s*(\d+)/);
  const N = nm ? Math.max(1, parseInt(nm[1], 10)) : 3;
  out = out.replace(/\{%-?\s*assign[^%]*%\}\n?/g, "");

  /* outer loop: child projects */
  out = out.replace(/\{%-?\s*for child in parentProject\.childrenProjects\s*-?%\}([\s\S]*?)\{%-?\s*endfor\s*-?%\}/g, (_, inner) =>
    SAMPLE_PROJECTS.map((p, i) =>
      inner
        .replace(/\{%\s*if forloop\.index < 10\s*%\}0\{%\s*endif\s*%\}/g, "0")
        .replace(/\{\{\s*forloop\.index0\s*\}\}/g, String(i))
        .replace(/\{\{\s*forloop\.index\s*\}\}/g, String(i + 1))
        .replace(/\{\{\s*ai\s*\}\}/g, String(i % N))
        .replace(/\{\{\s*child\.name\s*\}\}/g, p.name)
        .replace(/\{\{\s*child\.subpath\s*\}\}/g, p.subpath)
        .replace(/\{\{\s*child\.description[^}]*\}\}/g, p.desc)
    ).join("\n")
  );

  /* parent tokens + anything left over */
  out = out
    .replace(/\{\{\s*parentProject\.name\s*\}\}/g, "Benak Group")
    .replace(/\{\{\s*parentProject\.description[^}]*\}\}/g, "All product documentation in one place.");
  return out;
}

  return (
    <div className="glp-field">
      <label>{label}</label>
      {children}

function Seg({ value, options, onChange }) {
  return (
    <div className="glp-seg">
      {options.map((o) => (
        <button key={o.value} className={value === o.value ? "on" : ""} onClick={() => onChange(o.value)} type="button">
          {o.label}
        </button>
      ))}
    </div>
  );
}

function Slider({ label, value, min, max, step = 1, unit = "px", onChange }) {
  return (
    <Field label={label}>
      <div className="glp-slider">
        <input type="range" min={min} max={max} step={step} value={value} onChange={(e) => onChange(Number(e.target.value))} />

    </Field>
  );
}

/* ---------- accent swatch row (single or multi select) ---------- */
function AccentSwatches({ selected, onSelect, multi = false, customCard = null, onCustom = null }) {
  return (
    <>
      <div className="glp-swatches">
        {Object.entries(ACCENTS).map(([key, a]) => {
          const on = multi ? selected.includes(key) : selected === key;
          return (
            <button
              key={key}
              type="button"
              title={a.label}
              className={"glp-swatch" + (on ? " on" : "")}
              style={{ background: `linear-gradient(135deg, ${a.light} 50%, ${a.dark} 50%)` }}

          <button

/* ---------- card editor ---------- */
function CardEditor({ card, index, count, template, open, onToggle, onChange, onMove, onRemove }) {
  const acc = cardAccent(card);
  const spec = TSPEC[template];
  const set = (patch) => onChange({ ...card, ...patch });
  const setPeek = (i, val) => {
    const items = [...card.peekItems];
    items[i] = val;
    set({ peekItems: items });
  };
  return (
    <div className="glp-card">
      <div className="glp-card__head" onClick={onToggle}>
        <span className="glp-card__swatch" style={{ background: acc.light }} />
        <span className="glp-card__name">{card.title || "Untitled card"}</span>
        <span className="glp-card__meta">{card.href}</span>
        <button className="glp-iconbtn" title="Move up" disabled={index === 0}
          onClick={(e) => { e.stopPropagation(); onMove(-1); }} type="button">&#8593;</button>
        <button className="glp-iconbtn" title="Move down" disabled={index === count - 1}
          onClick={(e) => { e.stopPropagation(); onMove(1); }} type="button">&#8595;</button>
        <button className="glp-iconbtn" title="Delete card" disabled={count === 1}
          onClick={(e) => { e.stopPropagation(); onRemove(); }} type="button">&#10005;</button>
        <span className="glp-iconbtn" style={{ transform: open ? "rotate(90deg)" : "none", transition: "transform 150ms" }}>&#8250;</span>
      </div>
      {open && (
        <div className="glp-card__body">
          <div className="glp-row2">
            <Field label="Card title">
              <input className="glp-input" value={card.title} onChange={(e) => set({ title: e.target.value })} />
            </Field>
            <Field label="Links to (path)">
              <input className="glp-input" value={card.href} onChange={(e) => set({ href: normPath(e.target.value) })} placeholder="my-project" />
            </Field>
          </div>
          <Field label="Description">
            <textarea className="glp-textarea" value={card.blurb} onChange={(e) => set({ blurb: e.target.value })} />
          </Field>

          {spec.icon && (
            <Field label="Icon (emoji or 1–2 characters)">
              <input className="glp-input" style={{ width: 90 }} value={card.icon} onChange={(e) => set({ icon: e.target.value })} />
            </Field>
          )}
          {(spec.badge || spec.file) && (
            <div className="glp-row2">
              <Field label={spec.file ? "Label after File_0N (optional)" : "Badge text"}>
                <input className="glp-input" value={card.eyebrow} onChange={(e) => set({ eyebrow: e.target.value })} />
              </Field>
              {spec.badge && (
                <Field label="Badge icon">
                  <Seg
                    value={card.badge}
                    onChange={(v) => set({ badge: v })}
                    options={[
                      { value: "dot", label: "● Open" },
                      { value: "lock", label: "🔒 Locked" },
                    ]}
                  />
                </Field>
              )}
            </div>
          )}

          <Field label="Accent color">
            <AccentSwatches selected={card.accent} onSelect={(k) => set({ accent: k })} customCard={card} onCustom={set} />
          </Field>

          {spec.cta && !spec.ctaPlain && (
            <div className="glp-row2">
              <Field label="Button text">
                <input className="glp-input" value={card.ctaText} onChange={(e) => set({ ctaText: e.target.value })} />
              </Field>
              <Field label="Button style">
                <Seg
                  value={card.ctaStyle}
                  onChange={(v) => set({ ctaStyle: v })}
                  options={[
                    { value: "filled", label: "Filled" },
                    { value: "ghost", label: "Outlined" },
                  ]}
                />
              </Field>
            </div>
          )}
          {spec.cta && spec.ctaPlain && (
            <Field label="Link text (e.g. Open Folder)">
              <input className="glp-input" value={card.ctaText} onChange={(e) => set({ ctaText: e.target.value })} />
            </Field>
          )}

          <label className="glp-toggle">
            <input type="checkbox" checked={card.primary} onChange={(e) => set({ primary: e.target.checked })} />
            <span className="glp-toggle__text">
              <b>Highlight as the primary card</b>
              <span>Adds an accent-tinted border so this card reads as the main path.</span>
            </span>
          </label>

          {spec.peek && (
            <>
              <Field label="List heading (e.g. Popular, Inside)">
                <input className="glp-input" value={card.peekLabel} onChange={(e) => set({ peekLabel: e.target.value })} />
              </Field>
              <Field label="List items (leave blank to hide)">
                {card.peekItems.map((p, i) => (
                  <div className="glp-peekitem" key={i}>
                    <input className="glp-input" value={p} onChange={(e) => setPeek(i, e.target.value)} />
                    <button
                      className="glp-iconbtn"
                      type="button"
                      title="Remove item"
                      onClick={() => set({ peekItems: card.peekItems.filter((_, j) => j !== i) })}
                    >
                      &#10005;
                    </button>
                  </div>
                ))}
                {card.peekItems.length < 5 && (
                  <button className="glp-add glp-add--sm" type="button" onClick={() => set({ peekItems: [...card.peekItems, ""] })}>
                    + Add list item
                  </button>
                )}
              </Field>
              <label className="glp-toggle" style={{ paddingTop: 0 }}>
                <input type="checkbox" checked={card.peekArrows} onChange={(e) => set({ peekArrows: e.target.checked })} />
                <span className="glp-toggle__text">
                  <b>Arrow bullets</b>
                  <span>Show a small → in the accent color before each list item.</span>
                </span>
              </label>
            </>
          )}
        </div>
      )}
    </div>
  );
}

/* ---------- preview pane ---------- */
function Preview({ html, mode, setMode, device, setDevice, liquidNote }) {
  const [doc, setDoc] = useState(() => buildPreviewDoc(expandLiquidForPreview(html), mode));
  useEffect(() => {
    const t = setTimeout(() => setDoc(buildPreviewDoc(expandLiquidForPreview(html), mode)), 250);
    return () => clearTimeout(t);
  }, [html, mode]);
  return (
    <div className="glp-view">

        <span className="glp-view__label">Live preview</span>
        <Seg
          value={mode}
          onChange={setMode}

            { value: "dark", label: "☾ Dark" },
          ]}
        />
        <Seg
          value={device}
          onChange={setDevice}
          options={[
            { value: "desktop", label: "Desktop" },
            { value: "mobile", label: "Mobile" },
          ]}
        />

        />

  );
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [tab, setTab] = useState("build");
  const [config, setConfig] = useState(() => {
    /* hydrate from a shared link (#c=…) when present */
    try {
      const m = window.location.hash.match(/#c=([A-Za-z0-9+/=]+)/);
      if (m) return migrateConfig(decodeConfig(m[1]));
    } catch (e) {
      /* bad or absent hash — fall through to defaults */
    }
    return DEFAULT_CONFIG;
  });
  const [override, setOverride] = useState(null);
  const [openCard, setOpenCard] = useState(null);
  const [mode, setMode] = useState("light");
  const [device, setDevice] = useState("desktop");
  const [copied, setCopied] = useState(false);
  const [shared, setShared] = useState(false);

  const generated = useMemo(() => generateHTML(config), [config]);
  const exportHtml = override ?? generated;

  const patch = (p) => setConfig((c) => ({ ...c, ...p }));
  const setHero = (p) => setConfig((c) => ({ ...c, hero: { ...c.hero, ...p } }));
  const setTicker = (p) => setConfig((c) => ({ ...c, ticker: { ...c.ticker, ...p } }));
  const setLayout = (p) => setConfig((c) => ({ ...c, layout: { ...c.layout, ...p } }));
  const setBanner = (p) => setConfig((c) => ({ ...c, banner: { ...c.banner, ...p } }));
  const setSection = (p) => setConfig((c) => ({ ...c, section: { ...c.section, ...p } }));
  const setLiquid = (p) => setConfig((c) => ({ ...c, liquid: { ...c.liquid, ...p } }));

  const setTemplate = (t) =>
    setConfig((c) => {
      const presets = {
        audience: { colMin: 258, autoH: false },
        solutions: { colMin: 240, autoH: true },
        launchpad: { colMin: 250, autoH: true },
        bento: { colMin: 240, autoH: false, cardMinH: 220 },
        helpcenter: { colMin: 250, autoH: true },
        tiles: { colMin: 220, autoH: true },
        archive: { colMin: 260, autoH: true },
      };
      return { ...c, template: t, layout: { ...c.layout, ...presets[t] } };
    });

  const setCard = (id, next) => setConfig((c) => ({ ...c, cards: c.cards.map((k) => (k.id === id ? next : k)) }));
  const moveCard = (id, dir) =>
    setConfig((c) => {
      const i = c.cards.findIndex((k) => k.id === id);
      const j = i + dir;
      if (j < 0 || j >= c.cards.length) return c;
      const cards = [...c.cards];
      [cards[i], cards[j]] = [cards[j], cards[i]];
      return { ...c, cards };
    });
  const removeCard = (id) => setConfig((c) => (c.cards.length > 1 ? { ...c, cards: c.cards.filter((k) => k.id !== id) } : c));
  const addCard = () =>
    setConfig((c) => {
      if (c.cards.length >= 12) return c;
      const id = uid();
      setOpenCard(id);
      return { ...c, cards: [...c.cards, { ...CARD_DEFAULTS, id }] };
    });

  const toggleLiquidAccent = (key) =>
    setLiquid({
      accents: config.liquid.accents.includes(key)
        ? config.liquid.accents.length > 1
          ? config.liquid.accents.filter((k) => k !== key)
          : config.liquid.accents
        : [...config.liquid.accents, key],
    });

  const copyText = async (text) => {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch (e) {
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        return ok;
      } catch (e2) {
        return false;
      }
    }
  };

  const copy = useCallback(async () => {
    if (await copyText(exportHtml)) {
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    }
  }, [exportHtml]);

  const download = useCallback(() => {
    const blob = new Blob([exportHtml], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "global-landing-page.html";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 500);
  }, [exportHtml]);

  const share = useCallback(async () => {
    const encoded = encodeConfig(config);
    let payload = encoded;
    try {
      if (/^https?:/.test(window.location.protocol)) {
        const url = window.location.origin + window.location.pathname + "#c=" + encoded;
        window.history.replaceState(null, "", "#c=" + encoded);
        payload = url;
      }
    } catch (e) {
      /* sandboxed — fall back to copying the raw config string */
    }
    if (await copyText(payload)) {
      setShared(true);
      setTimeout(() => setShared(false), 1800);
    }
  }, [config]);

  const liquidOn = config.liquid.enabled;
  const spec = TSPEC[config.template];

  return (
    <div className="glp">
      <style>{APP_CSS}</style>

      <div className="glp-bar">
        <div className="glp-logo">
          <div className="glp-logo__mark">GL</div>

            <div className="glp-logo__tag">Global landing pages for ReadMe Enterprise</div>
          </div>
        </div>
        <div className="glp-tabs">
          <button className={"glp-tab" + (tab === "build" ? " on" : "")} onClick={() => setTab("build")} type="button">
            BUILD
          </button>
          <button className={"glp-tab" + (tab === "code" ? " on" : "")} onClick={() => setTab("code")} type="button">
            CODE
          </button>
        </div>
        <div className="glp-bar__right">
          <button className={"glp-smallbtn" + (shared ? " done" : "")} onClick={share} type="button" style={{ padding: "8px 13px" }}>
            {shared ? "✓ Link copied" : "Share link"}
          </button>
          <button className="glp-smallbtn" onClick={download} type="button" style={{ padding: "8px 13px" }}>
            Download .html
          </button>
          <button className={"glp-copy" + (copied ? " done" : "")} onClick={copy} type="button">
            {copied ? "✓ Copied" : "Copy HTML"}
          </button>
        </div>
      </div>

      <div className="glp-main">
        {tab === "build" ? (
          <>

              {override !== null && (

                          <div className="glp-row2">
                            <Field label="List heading">
                              <input className="glp-input" value={config.liquid.peekLabel} onChange={(e) => setLiquid({ peekLabel: e.target.value })} />
                            </Field>
                            <Slider label="Categories shown" value={config.liquid.peekCount} min={1} max={5} unit="" onChange={(v) => setLiquid({ peekCount: v })} />
                          </div>
                        )}
                      </>
                    )}
                    {spec.cta && (
                      <div className="glp-row2">
                        <Field label={spec.ctaPlain ? "Link text" : "Button text (all cards)"}>
                          <input className="glp-input" value={config.liquid.ctaText} onChange={(e) => setLiquid({ ctaText: e.target.value })} />
                        </Field>
                        {!spec.ctaPlain && (
                          <Field label="Button style">
                            <Seg
                              value={config.liquid.ctaStyle}
                              onChange={(v) => setLiquid({ ctaStyle: v })}
                              options={[
                                { value: "filled", label: "Filled" },
                                { value: "ghost", label: "Outlined" },
                              ]}
                            />
                          </Field>
                        )}
                      </div>
                    )}
                    <Field label="Accent cycle (cards rotate through the selected colors)">
                      <AccentSwatches multi selected={config.liquid.accents} onSelect={toggleLiquidAccent} />
                    </Field>
                  </>
                ) : (
                  <>
                    {config.cards.map((card, i) => (
                      <CardEditor
                        key={card.id}
                        card={card}
                        index={i}
                        count={config.cards.length}
                        template={config.template}
                        open={openCard === card.id}
                        onToggle={() => setOpenCard(openCard === card.id ? null : card.id)}
                        onChange={(next) => setCard(card.id, next)}
                        onMove={(dir) => moveCard(card.id, dir)}
                        onRemove={() => removeCard(card.id)}
                      />
                    ))}
                    <button className="glp-add" type="button" onClick={addCard} disabled={config.cards.length >= 12}>
                      + Add card ({config.cards.length}/12)
                    </button>
                  </>
                )}
              </details>

              <details className="glp-sec" open>
                <summary className="glp-sec__label">Layout</summary>
                <Field label="Page width">
                  <Seg
                    value={config.layout.maxW}
                    onChange={(v) => setLayout({ maxW: v })}
                    options={[
                      { value: 960, label: "Narrow" },
                      { value: 1120, label: "Default" },
                      { value: 1280, label: "Wide" },
                    ]}
                  />
                </Field>
                {config.template !== "bento" && (
                  <Slider label="Minimum column width (controls cards per row)" value={config.layout.colMin} min={180} max={360} onChange={(v) => setLayout({ colMin: v })} />
                )}
                <Slider label="Gap between cards" value={config.layout.gap} min={12} max={36} onChange={(v) => setLayout({ gap: v })} />
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.layout.autoH} onChange={(e) => setLayout({ autoH: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Auto card height</b>
                    <span>Let content decide the height instead of a fixed minimum.</span>
                  </span>
                </label>
                {!config.layout.autoH && (
                  <Slider label="Card minimum height" value={config.layout.cardMinH} min={140} max={520} step={4} onChange={(v) => setLayout({ cardMinH: v })} />
                )}
              </details>

              <details className="glp-sec" open>
                <summary className="glp-sec__label">Contact banner</summary>
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.banner.enabled} onChange={(e) => setBanner({ enabled: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Show a banner below the cards</b>
                    <span>Full-width call-to-action, like dLocal's "Need help building your solution?"</span>
                  </span>
                </label>
                {config.banner.enabled && (
                  <>
                    <Field label="Banner title">
                      <input className="glp-input" value={config.banner.title} onChange={(e) => setBanner({ title: e.target.value })} />
                    </Field>
                    <Field label="Banner text">
                      <textarea className="glp-textarea" value={config.banner.text} onChange={(e) => setBanner({ text: e.target.value })} />
                    </Field>
                    <div className="glp-row2">
                      <Field label="Button label">
                        <input className="glp-input" value={config.banner.btnLabel} onChange={(e) => setBanner({ btnLabel: e.target.value })} />
                      </Field>
                      <Field label="Button link">
                        <input className="glp-input" value={config.banner.btnHref} onChange={(e) => setBanner({ btnHref: normPath(e.target.value) })} />
                      </Field>
                    </div>
                  </>
                )}
              </details>

              <details className="glp-sec" open>
                <summary className="glp-sec__label">Footer</summary>
                <Field label="Footer line (blank to hide)">
                  <input className="glp-input" value={config.footer} onChange={(e) => patch({ footer: e.target.value })} />
                </Field>
              </details>
            </div>
            <Preview html={generated} mode={mode} setMode={setMode} device={device} setDevice={setDevice} liquidNote={liquidOn} />
          </>
        ) : (
          <>
            <div className="glp-code">
              {override !== null && (
                <div className="glp-banner">
                  <span>Edited by hand — builder changes won't apply until you sync.</span>
                  <button className="glp-smallbtn" type="button" onClick={() => setOverride(null)}>
                    Sync from builder
                  </button>
                </div>
              )}
              <div className="glp-code__bar">
                <span className="glp-view__label">Raw HTML{liquidOn && !override ? " + Liquid" : ""}</span>
                {liquidOn && !override && <span className="glp-chip glp-chip--liquid">liquid</span>}
                <span className={"glp-chip" + (override !== null ? " glp-chip--warn" : "")}>
                  {override !== null ? "manual edits" : "generated from builder"}
                </span>
                <span className="glp-chip">{(exportHtml.length / 1024).toFixed(1)} KB</span>
              </div>
              <textarea spellCheck={false} value={exportHtml} onChange={(e) => setOverride(e.target.value)} />
            </div>
            <Preview html={exportHtml} mode={mode} setMode={setMode} device={device} setDevice={setDevice} liquidNote={liquidOn && !override} />
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
