/* ---------- section editor ---------- */
function SectionEditor({ section, index, count, hideAccents, globalStyle, open, onToggle, onMove, onRemove, onDuplicate, onChange, cardOps, openCard, setOpenCard }) {
  const set = (patch) => onChange({ ...section, ...patch });
  const setStyle = (patch) => onChange({ ...section, style: { ...section.style, ...patch } });
  const setLay = (patch) => onChange({ ...section, layout: { ...section.layout, ...patch } });
  const setLiq = (patch) => onChange({ ...section, liquid: { ...section.liquid, ...patch } });
  const isCols = section.type === "columns";
  /* the style that actually renders this section's cards: its own or the global one */
  const est = section.styleMode === "custom" ? section.style : globalStyle;
  const liquidOn = section.source === "liquid";
  const toggleLiqAccent = (key) =>
    setLiq({
      accents: section.liquid.accents.includes(key)
        ? section.liquid.accents.length > 1
          ? section.liquid.accents.filter((k) => k !== key)
          : section.liquid.accents
        : [...section.liquid.accents, key],
    });
  const colOps = {
    set: (id, next) => set({ columns: section.columns.map((c) => (c.id === id ? next : c)) }),
    move: (id, dir) => {
      const i = section.columns.findIndex((c) => c.id === id);
      const j = i + dir;
      if (j < 0 || j >= section.columns.length) return;
      const arr = [...section.columns];
      [arr[i], arr[j]] = [arr[j], arr[i]];
      set({ columns: arr });
    },
    remove: (id) => { if (section.columns.length > 1) set({ columns: section.columns.filter((c) => c.id !== id) }); },
    add: () => {
      if (section.columns.length >= 4) return;
      const col = makeColumn();
      setOpenCard(col.id);
      set({ columns: [...section.columns, col] });
    },
    duplicate: (id) => {
      if (section.columns.length >= 4) return;
      const i = section.columns.findIndex((c) => c.id === id);
      if (i < 0) return;
      const copy = { ...section.columns[i], id: uid(), cta: { ...section.columns[i].cta } };
      const arr = [...section.columns];
      arr.splice(i + 1, 0, copy);
      setOpenCard(copy.id);
      set({ columns: arr });
    },
  };

  return (
    <div className="glp-card glp-section">
      <div className="glp-card__head" onClick={onToggle}>
        <span className="glp-card__name">{section.heading || `Section ${index + 1}`}</span>
        <span className="glp-card__meta">{isCols ? section.columns.length + " cols" : liquidOn ? "auto" : section.cards.length + " cards"}</span>
        <button className="glp-iconbtn" title="Move up" disabled={index === 0}
          onClick={(e) => { e.stopPropagation(); onMove(-1); }} type="button">&#8593;</button>
        <button className="glp-iconbtn" title="Move down" disabled={index === count - 1}
          onClick={(e) => { e.stopPropagation(); onMove(1); }} type="button">&#8595;</button>
        <button className="glp-iconbtn" title="Duplicate section" disabled={count >= 6}
          onClick={(e) => { e.stopPropagation(); onDuplicate(); }} type="button">&#10697;</button>
        <button className="glp-iconbtn" title="Delete section" disabled={count === 1}
          onClick={(e) => { e.stopPropagation(); onRemove(); }} type="button">&#10005;</button>
        <span className="glp-iconbtn" style={{ transform: open ? "rotate(90deg)" : "none", transition: "transform 150ms" }}>&#8250;</span>
      </div>
      {open && (
        <div className="glp-card__body">
          <Field label="Section heading (blank to hide)">
            <input className="glp-input" value={section.heading} onChange={(e) => set({ heading: e.target.value })} placeholder="e.g. For developers" />
          </Field>
          <Field label="Intro text (blank to hide)">
            <textarea className="glp-textarea" value={section.intro} onChange={(e) => set({ intro: e.target.value })} />
          </Field>
          <Field label="Text alignment (independent of the hero)">
            <Seg
              value={section.align}
              onChange={(v) => set({ align: v })}
              options={[
                { value: "center", label: "Centered" },
                { value: "left", label: "Left" },
              ]}
            />
          </Field>
          <Field label="Section type">
            <Seg
              value={isCols ? "columns" : "cards"}
              onChange={(v) => set({ type: v })}
              options={[
                { value: "cards", label: "Cards" },
                { value: "columns", label: "Text columns" },
              ]}
            />
          </Field>

          <div className="glp-sub">Spacing &amp; background</div>
          <Slider label="Space above section" value={section.layout.spaceAbove == null ? 36 : section.layout.spaceAbove} min={0} max={160} step={2} onChange={(v) => setLay({ spaceAbove: v })} />
          <label className="glp-toggle" style={{ paddingTop: 0 }}>
            <input type="checkbox" checked={!!section.layout.divider} onChange={(e) => setLay({ divider: e.target.checked })} />
            <span className="glp-toggle__text">
              <b>Divider line above</b>
              <span>A hairline centered in the space above this section.</span>
            </span>
          </label>
          <Field label="Section background">
            <Seg
              value={section.layout.bg || "none"}
              onChange={(v) => setLay({ bg: v })}
              options={[
                { value: "none", label: "None" },
                { value: "subtle", label: "Subtle" },
                { value: "accent", label: "Accent" },
              ]}
            />
          </Field>

          {isCols ? (
            <>
              <Slider label="Gap between columns" value={section.layout.gap} min={12} max={56} onChange={(v) => setLay({ gap: v })} />
              <div className="glp-sub">Columns</div>
              {section.columns.map((col, i) => (
                <ColumnEditor
                  key={col.id}
                  column={col}
                  index={i}
                  count={section.columns.length}
                  open={openCard === col.id}
                  onToggle={() => setOpenCard(openCard === col.id ? null : col.id)}
                  onChange={(next) => colOps.set(col.id, next)}
                  onMove={(dir) => colOps.move(col.id, dir)}
                  onRemove={() => colOps.remove(col.id)}
                  onDuplicate={() => colOps.duplicate(col.id)}
                />
              ))}
              <button className="glp-add" type="button" onClick={colOps.add} disabled={section.columns.length >= 4}>
                + Add column ({section.columns.length}/4)
              </button>
            </>
          ) : (
            <>
              <div className="glp-sub">Card style</div>
              <Field label="Card style source">
                <Seg
                  value={section.styleMode === "custom" ? "custom" : "global"}
                  onChange={(v) => set({ styleMode: v })}
                  options={[
                    { value: "global", label: "Global" },
                    { value: "custom", label: "Custom" },
                  ]}
                />
              </Field>
              {section.styleMode === "custom" ? (
                <CardStyleControls style={section.style} setStyle={setStyle} />
              ) : (
                <div className="glp-note">
                  Using the <b>global card style</b> — edit it in <b>Theme&nbsp;Editor → Global card style</b> to restyle every global section at once. Switch to <b>Custom</b> to override just this section.
                </div>
              )}

              <div className="glp-sub">Grid</div>
              <label className="glp-toggle" style={{ paddingTop: 0 }}>
                <input type="checkbox" checked={section.layout.bento} onChange={(e) => setLay({ bento: e.target.checked })} />
                <span className="glp-toggle__text">
                  <b>Bento grid</b>
                  <span>Asymmetric mixed-size 6-column layout.</span>
                </span>
              </label>
              {!section.layout.bento && (
                <Slider label="Minimum column width (cards per row)" value={section.layout.colMin} min={180} max={360} onChange={(v) => setLay({ colMin: v })} />
              )}
              <Slider label="Gap between cards" value={section.layout.gap} min={12} max={36} onChange={(v) => setLay({ gap: v })} />
              <label className="glp-toggle">
                <input type="checkbox" checked={section.layout.autoH} onChange={(e) => setLay({ autoH: e.target.checked })} />
                <span className="glp-toggle__text">
                  <b>Auto card height</b>
                  <span>Let content decide the height instead of a fixed minimum.</span>
                </span>
              </label>
              {!section.layout.autoH && (
                <Slider label="Card minimum height" value={section.layout.cardMinH} min={140} max={800} step={4} onChange={(v) => setLay({ cardMinH: v })} />
              )}

              <div className="glp-sub">Cards</div>
              <Field label="Card source">
                <Seg
                  value={section.source}
                  onChange={(v) => set({ source: v })}
                  options={[
                    { value: "static", label: "Manual cards" },
                    { value: "liquid", label: "Auto from projects" },
                  ]}
                />
              </Field>

              {liquidOn ? (
                <LiquidControls section={section} st={est} setLiq={setLiq} toggleLiqAccent={toggleLiqAccent} hideAccents={hideAccents} />
              ) : (
                <>
                  {section.cards.map((card, i) => (
                    <CardEditor
                      key={card.id}
                      card={card}
                      index={i}
                      count={section.cards.length}
                      style={est}
                      hideAccents={hideAccents}
                      open={openCard === card.id}
                      onToggle={() => setOpenCard(openCard === card.id ? null : card.id)}
                      onChange={(next) => cardOps.set(card.id, next)}
                      onMove={(dir) => cardOps.move(card.id, dir)}
                      onRemove={() => cardOps.remove(card.id)}
                      onDuplicate={() => cardOps.duplicate(card.id)}
                    />
                  ))}
                  <button className="glp-add" type="button" onClick={cardOps.add} disabled={section.cards.length >= 12}>
                    + Add card ({section.cards.length}/12)
                  </button>
                </>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

/* ---------- preview pane ---------- */
function Preview({ html, mode, setMode, device, setDevice, liquidNote, focusIndex }) {
  /* Double-buffered preview: render the new doc into the hidden iframe and
     only reveal it once it has finished loading, so the visible frame never
     blanks (which read as a flash on every edit). */
  const [slots, setSlots] = useState(() => [buildPreviewDoc(expandLiquidForPreview(html), mode), ""]);
  const [active, setActive] = useState(0);
  const activeRef = useRef(0);
  activeRef.current = active;
  const frames = useRef([null, null]);
  /* remember where the user has scrolled the visible preview so a swap (which
     loads a brand-new iframe, always starting at the top) can restore it —
     otherwise every edit snaps the preview back to the top. */
  const scrollRef = useRef({ x: 0, y: 0 });
  /* mirror of `slots` for the timeout below so it never reads stale state
     (the effect only re-runs on html/mode, but slots also changes on swap) */
  const slotsRef = useRef(slots);
  slotsRef.current = slots;
  const captureScroll = () => {
    const f = frames.current[activeRef.current];
    try {
      if (f && f.contentWindow) scrollRef.current = { x: f.contentWindow.scrollX, y: f.contentWindow.scrollY };
    } catch (e) {}
  };
  const restoreScroll = (i) => {
    try {
      const f = frames.current[i];
      if (f && f.contentWindow) f.contentWindow.scrollTo(scrollRef.current.x, scrollRef.current.y);
    } catch (e) {}
  };
  useEffect(() => {
    const t = setTimeout(() => {
      const doc = buildPreviewDoc(expandLiquidForPreview(html), mode);
      const cur = activeRef.current;
      const back = cur === 0 ? 1 : 0;
      const s = slotsRef.current;
      if (s[cur] === doc) return; // already the visible doc — nothing to do
      captureScroll();
      if (s[back] === doc) {
        /* the hidden buffer already holds this exact doc (e.g. you toggled a
           switch back off, or dragged a slider back to a prior value) — writing
           it again is a no-op that fires no load event, so the visible frame
           would stay stale. Reveal the buffer we already have instead. */
        restoreScroll(back);
        setActive(back);
        return;
      }
      setSlots(back === 0 ? [doc, s[1]] : [s[0], doc]);
    }, 250);
    return () => clearTimeout(t);
  }, [html, mode]);
  const onFrameLoad = (i) => {
    if (i === activeRef.current || !slotsRef.current[i]) return; // only react to the freshly-loaded back buffer
    restoreScroll(i); // restore the captured scroll onto the incoming frame before revealing it
    setActive(i);
  };
  /* when a section is selected in the builder, scroll the preview to it and flash it */
  useEffect(() => {
    if (focusIndex == null) return;
    const t = setTimeout(() => {
      const f = frames.current[activeRef.current];
      try {
        const el = f && f.contentDocument && f.contentDocument.querySelector(".bnk-sec-" + focusIndex);
        if (!el) return;
        el.scrollIntoView({ behavior: "smooth", block: "start" });
        el.classList.remove("bnk-flash");
        void el.offsetWidth; // restart the animation if it was mid-flight
        el.classList.add("bnk-flash");
        setTimeout(() => { try { el.classList.remove("bnk-flash"); } catch (e) {} }, 1500);
      } catch (e) {}
    }, 90);
    return () => clearTimeout(t);
  }, [focusIndex]);
  return (
    <div className="glp-view">
      <div className="glp-view__bar">
        <span className="glp-view__label">Live preview</span>
        <Seg
          value={mode}
          onChange={setMode}
          options={[
            { value: "light", label: "☀ Light" },
            { value: "dark", label: "☾ Dark" },
          ]}
        />
        <Seg
          value={device}
          onChange={setDevice}
          options={[
            { value: "desktop", label: "Desktop" },
            { value: "mobile", label: "Mobile" },
          ]}
        />
        <span style={{ marginLeft: "auto", fontSize: 11.5, color: "var(--ink-3)" }}>
          {liquidNote ? "Liquid preview uses 3 sample projects — ReadMe renders your real ones" : "Header, search & Ask AI are stand-ins for ReadMe's hub chrome"}
        </span>
      </div>
      <div className="glp-view__framewrap">
        <div className="glp-framestack">
          {[0, 1].map((i) => (
            <iframe
              key={i}
              ref={(el) => { frames.current[i] = el; }}
              className={"glp-frame" + (device === "mobile" ? " mobile" : "") + (i === active ? " on" : "")}
              title="Landing page preview"
              sandbox="allow-scripts allow-same-origin"
              srcDoc={slots[i]}
              onLoad={() => onFrameLoad(i)}
            />
          ))}
        </div>
      </div>
    </div>
  );
}

/* ---------- React-controlled nav accordion panel ---------- */
function NavSection({ id, label, openNav, setOpenNav, children }) {
  const open = openNav === id;
  return (
    <div className={"glp-sec" + (open ? " open" : "")}>
      <button type="button" className="glp-sec__label" aria-expanded={open} onClick={() => setOpenNav(open ? null : id)}>
        {label}
      </button>
      {open && <div className="glp-sec__body">{children}</div>}
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const boot = useRef(null);
  if (!boot.current) boot.current = loadInitialState();
  const [tab, setTab] = useState("build");
  const [config, setConfig] = useState(boot.current.config);
  const [override, setOverride] = useState(boot.current.override);
  const [designs, setDesigns] = useState(boot.current.designs);
  const [currentId, setCurrentId] = useState(boot.current.currentId);
  const [sharedView, setSharedView] = useState(boot.current.sharedView);
  const [pagesOpen, setPagesOpen] = useState(false);
  const [renaming, setRenaming] = useState(false);
  const [openCard, setOpenCard] = useState(null);
  const [openNav, setOpenNav] = useState("sections");
  const [openSection, setOpenSection] = useState(boot.current.config.sections[0].id);
  const [mode, setMode] = useState("light");
  const [device, setDevice] = useState("desktop");
  const [copied, setCopied] = useState(false);
  const [shared, setShared] = useState(false);
  const [saveState, setSaveState] = useState("saved");
  const firstAutosave = useRef(true);
  const [histVer, setHistVer] = useState(0);
  const past = useRef([]);
  const future = useRef([]);
  const snapRef = useRef(config);
  const skipHist = useRef(false);

  const generated = useMemo(() => generateHTML(config), [config]);
  const exportHtml = override ?? generated;

  const patch = (p) => setConfig((c) => ({ ...c, ...p }));
  const setHero = (p) => setConfig((c) => ({ ...c, hero: { ...c.hero, ...p } }));
  const setTicker = (p) => setConfig((c) => ({ ...c, ticker: { ...c.ticker, ...p } }));
  const setLayout = (p) => setConfig((c) => ({ ...c, layout: { ...c.layout, ...p } }));
  const setBanner = (p) => setConfig((c) => ({ ...c, banner: { ...c.banner, ...p } }));
  const setHeaderImage = (p) => setConfig((c) => ({ ...c, headerImage: { ...c.headerImage, ...p } }));
  const setTheme = (p) => setConfig((c) => ({ ...c, theme: { ...c.theme, ...p } }));
  const setCardStyle = (p) => setConfig((c) => ({ ...c, cardStyle: { ...(c.cardStyle || DEFAULT_STYLE), ...p } }));
  const applyPreset = (preset) => setConfig((c) => ({ ...c, cardStyle: { ...DEFAULT_STYLE, ...preset.style } }));

  /* ---- undo / redo history (rollback) ---- */
  useEffect(() => {
    if (skipHist.current) { skipHist.current = false; snapRef.current = config; return; }
    const t = setTimeout(() => {
      if (config !== snapRef.current) {
        past.current.push(snapRef.current);
        if (past.current.length > 60) past.current.shift();
        future.current = [];
        snapRef.current = config;
        setHistVer((v) => v + 1);
      }
    }, 600);
    return () => clearTimeout(t);
  }, [config]);

  const applyHistory = (cfg) => {
    skipHist.current = true;
    snapRef.current = cfg;
    setConfig(cfg);
    setOpenCard(null);
    setOpenSection((os) => (cfg.sections.some((s) => s.id === os) ? os : cfg.sections[0].id));
    setHistVer((v) => v + 1);
  };
  const undo = () => {
    /* fold any un-captured in-progress edit into history first */
    if (config !== snapRef.current) { past.current.push(snapRef.current); future.current = []; snapRef.current = config; }
    if (!past.current.length) return;
    future.current.push(config);
    applyHistory(past.current.pop());
  };
  const redo = () => {
    if (!future.current.length) return;
    past.current.push(config);
    applyHistory(future.current.pop());
  };
  const canUndo = past.current.length > 0 || config !== snapRef.current;
  const canRedo = future.current.length > 0;

  useEffect(() => {
    const h = (e) => {
      if (!(e.metaKey || e.ctrlKey) || e.key.toLowerCase() !== "z") return;
      const t = e.target;
      if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable)) return; // let native text undo win
      e.preventDefault();
      if (e.shiftKey) redo();
      else undo();
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  });

  /* ---- section ops ---- */
  const updateSection = (id, next) => setConfig((c) => ({ ...c, sections: c.sections.map((s) => (s.id === id ? next : s)) }));
  const moveSection = (id, dir) =>
    setConfig((c) => {
      const i = c.sections.findIndex((s) => s.id === id);
      const j = i + dir;
      if (j < 0 || j >= c.sections.length) return c;
      const arr = [...c.sections];
      [arr[i], arr[j]] = [arr[j], arr[i]];
      return { ...c, sections: arr };
    });
  const removeSection = (id) => setConfig((c) => (c.sections.length > 1 ? { ...c, sections: c.sections.filter((s) => s.id !== id) } : c));
  const addSection = () =>
    setConfig((c) => {
      if (c.sections.length >= 6) return c;
      const id = uid();
      const ns = {
        id,
        type: "cards",
        heading: "New section",
        intro: "",
        align: "center",
        source: "static",
        styleMode: "global",
        style: { ...DEFAULT_STYLE },
        layout: { ...DEFAULT_SECTION_LAYOUT },
        liquid: { ...DEFAULT_LIQUID },
        columns: DEFAULT_COLUMNS(),
        cards: [{ ...CARD_DEFAULTS, id: uid() }],
      };
      setOpenSection(id);
      return { ...c, sections: [...c.sections, ns] };
    });
  const duplicateSection = (id) =>
    setConfig((c) => {
      if (c.sections.length >= 6) return c;
      const i = c.sections.findIndex((s) => s.id === id);
      if (i < 0) return c;
      const src = c.sections[i];
      const copy = {
        ...src,
        id: uid(),
        style: { ...src.style },
        layout: { ...src.layout },
        liquid: { ...src.liquid, accents: [...src.liquid.accents] },
        columns: src.columns.map((col) => ({ ...col, id: uid(), cta: { ...col.cta } })),
        cards: src.cards.map((k) => ({ ...k, id: uid(), peekItems: [...k.peekItems] })),
      };
      const arr = [...c.sections];
      arr.splice(i + 1, 0, copy);
      setOpenSection(copy.id);
      return { ...c, sections: arr };
    });

  /* ---- card ops scoped to a section ---- */
  const cardOpsFor = (secId) => ({
    set: (cardId, next) =>
      setConfig((c) => ({
        ...c,
        sections: c.sections.map((s) => (s.id !== secId ? s : { ...s, cards: s.cards.map((k) => (k.id === cardId ? next : k)) })),
      })),
    move: (cardId, dir) =>
      setConfig((c) => ({
        ...c,
        sections: c.sections.map((s) => {
          if (s.id !== secId) return s;
          const i = s.cards.findIndex((k) => k.id === cardId);
          const j = i + dir;
          if (j < 0 || j >= s.cards.length) return s;
          const arr = [...s.cards];
          [arr[i], arr[j]] = [arr[j], arr[i]];
          return { ...s, cards: arr };
        }),
      })),
    remove: (cardId) =>
      setConfig((c) => ({
        ...c,
        sections: c.sections.map((s) => (s.id !== secId ? s : s.cards.length > 1 ? { ...s, cards: s.cards.filter((k) => k.id !== cardId) } : s)),
      })),
    add: () =>
      setConfig((c) => ({
        ...c,
        sections: c.sections.map((s) => {
          if (s.id !== secId) return s;
          if (s.cards.length >= 12) return s;
          const id = uid();
          setOpenCard(id);
          return { ...s, cards: [...s.cards, { ...CARD_DEFAULTS, id }] };
        }),
      })),
    duplicate: (cardId) =>
      setConfig((c) => ({
        ...c,
        sections: c.sections.map((s) => {
          if (s.id !== secId || s.cards.length >= 12) return s;
          const i = s.cards.findIndex((k) => k.id === cardId);
          if (i < 0) return s;
          const copy = { ...s.cards[i], id: uid(), peekItems: [...s.cards[i].peekItems] };
          const arr = [...s.cards];
          arr.splice(i + 1, 0, copy);
          setOpenCard(copy.id);
          return { ...s, cards: arr };
        }),
      })),
  });

  /* ---- named designs / autosave ---- */
  const currentName = sharedView
    ? "Shared design"
    : ((designs.find((d) => d.id === currentId) || {}).name || "Untitled page");

  const stripHash = () => {
    try { window.history.replaceState(null, "", window.location.pathname + window.location.search); } catch (e) {}
  };
  const uniqueName = (base) => {
    const names = new Set(designs.map((d) => d.name));
    if (!names.has(base)) return base;
    let n = 2;
    while (names.has(`${base} ${n}`)) n++;
    return `${base} ${n}`;
  };

  /* autosave the working design into its slot (debounced); skipped while viewing a shared link */
  useEffect(() => {
    if (sharedView || !currentId) return;
    /* don't flash "Saving…" on first mount / page switch — only on real edits */
    if (firstAutosave.current) { firstAutosave.current = false; return; }
    setSaveState("saving");
    const t = setTimeout(() => {
      setDesigns((ds) => {
        const next = ds.map((d) => (d.id === currentId ? { ...d, config, override: override ?? "", updatedAt: nowMs() } : d));
        persistDesigns(next, currentId);
        return next;
      });
      setSaveState("saved");
    }, 500);
    return () => clearTimeout(t);
  }, [config, override, currentId, sharedView]);

  const switchTo = (id) => {
    const d = designs.find((x) => x.id === id);
    if (!d) return;
    const cfg = migrateConfig(d.config);
    setConfig(cfg);
    setOverride(d.override || null);
    setCurrentId(id);
    setSharedView(false);
    setOpenSection(cfg.sections[0].id);
    setOpenCard(null);
    setPagesOpen(false);
    setRenaming(false);
    stripHash();
    try { localStorage.setItem(CURRENT_KEY, id); } catch (e) {}
  };

  const newPage = () => {
    const d = makeDesign(uniqueName("Untitled page"), DEFAULT_CONFIG, "");
    const ds = [...designs, d];
    setDesigns(ds);
    persistDesigns(ds, d.id);
    setConfig(DEFAULT_CONFIG);
    setOverride(null);
    setCurrentId(d.id);
    setSharedView(false);
    setOpenSection(DEFAULT_CONFIG.sections[0].id);
    setOpenCard(null);
    setPagesOpen(false);
    setRenaming(false);
    stripHash();
  };

  const duplicateCurrent = () => {
    const src = designs.find((d) => d.id === currentId);
    const d = makeDesign(uniqueName((src ? src.name : "Page") + " copy"), config, override ?? "");
    const ds = [...designs, d];
    setDesigns(ds);
    persistDesigns(ds, d.id);
    setCurrentId(d.id);
    setSharedView(false);
    setPagesOpen(false);
    setRenaming(false);
    stripHash();
  };

  const saveSharedAsPage = () => {
    const d = makeDesign(uniqueName("Shared page"), config, override ?? "");
    const ds = [...designs, d];
    setDesigns(ds);
    persistDesigns(ds, d.id);
    setCurrentId(d.id);
    setSharedView(false);
    stripHash();
  };

  const renameCurrent = (name) => {
    const nm = (name || "").trim() || "Untitled page";
    const ds = designs.map((d) => (d.id === currentId ? { ...d, name: nm } : d));
    setDesigns(ds);
    persistDesigns(ds, currentId);
    setRenaming(false);
  };

  const deleteCurrent = () => {
    try {
      if (!window.confirm(`Delete "${currentName}"? This can't be undone.`)) return;
    } catch (e) {}
    let ds = designs.filter((d) => d.id !== currentId);
    if (!ds.length) ds = [makeDesign("Untitled page", DEFAULT_CONFIG, "")];
    const target = ds[0];
    const cfg = migrateConfig(target.config);
    setDesigns(ds);
    persistDesigns(ds, target.id);
    setConfig(cfg);
    setOverride(target.override || null);
    setCurrentId(target.id);
    setSharedView(false);
    setOpenSection(cfg.sections[0].id);
    setOpenCard(null);
    setPagesOpen(false);
    setRenaming(false);
  };

  const copyText = async (text) => {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch (e) {
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        return ok;
      } catch (e2) {
        return false;
      }
    }
  };

  const copy = useCallback(async () => {
    if (await copyText(exportHtml)) {
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    }
  }, [exportHtml]);

  const download = useCallback(() => {
    const blob = new Blob([exportHtml], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "global-landing-page.html";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 500);
  }, [exportHtml]);

  const share = useCallback(async () => {
    const encoded = encodeConfig(config);
    let payload = encoded;
    try {
      if (/^https?:/.test(window.location.protocol)) {
        /* copy a shareable URL without hijacking this tab's address bar,
           so the author's page keeps autosaving under its own slot */
        payload = window.location.origin + window.location.pathname + "#c=" + encoded;
      }
    } catch (e) {
      /* sandboxed — fall back to copying the raw config string */
    }
    if (await copyText(payload)) {
      setShared(true);
      setTimeout(() => setShared(false), 1800);
    }
  }, [config]);

  const hasLiquid = config.sections.some((s) => s.type !== "columns" && s.source === "liquid");

  return (
    <div className="glp">
      <style>{APP_CSS}</style>

      <div className="glp-bar">
        <div className="glp-logo">
          <div className="glp-logo__mark">GL</div>
          <div>
            <div className="glp-logo__name">GLP Builder</div>
            <div className="glp-logo__tag">Global landing pages for ReadMe Enterprise</div>
          </div>
        </div>
        <div className="glp-tabs">
          <button className={"glp-tab" + (tab === "build" ? " on" : "")} onClick={() => setTab("build")} type="button">
            BUILD
          </button>
          <button className={"glp-tab" + (tab === "code" ? " on" : "")} onClick={() => setTab("code")} type="button">
            CODE
          </button>
        </div>
        <div className="glp-bar__right">
          <button className="glp-smallbtn" type="button" title="Undo (⌘Z)" disabled={!canUndo} onClick={undo} style={{ padding: "8px 11px" }}>↶</button>
          <button className="glp-smallbtn" type="button" title="Redo (⇧⌘Z)" disabled={!canRedo} onClick={redo} style={{ padding: "8px 11px" }}>↷</button>
          {!sharedView && currentId && (
            <span className={"glp-save" + (saveState === "saved" ? " ok" : "")}>{saveState === "saving" ? "Saving…" : "Saved ✓"}</span>
          )}
          <div className="glp-pages">
            <button className="glp-smallbtn glp-pages__btn" type="button" onClick={() => { setPagesOpen((o) => !o); setRenaming(false); }} title="Saved pages" style={{ padding: "8px 13px" }}>
              <span className="glp-pages__label">{sharedView ? "Shared design (unsaved)" : currentName}</span>
              <span aria-hidden="true">▾</span>
            </button>
            {pagesOpen && (
              <>
                <div className="glp-pages__backdrop" onClick={() => { setPagesOpen(false); setRenaming(false); }} />
                <div className="glp-pages__menu">
                  <div className="glp-pages__list">
                    {designs.slice().sort((a, b) => b.updatedAt - a.updatedAt).map((d) => (
                      <button key={d.id} type="button" className={"glp-pages__item" + (d.id === currentId && !sharedView ? " on" : "")} onClick={() => switchTo(d.id)}>
                        <span className="glp-pages__check">{d.id === currentId && !sharedView ? "✓" : ""}</span>
                        <span className="glp-pages__name">{d.name}</span>
                        <span className="glp-pages__time">{relTime(d.updatedAt)}</span>
                      </button>
                    ))}
                    {!designs.length && <div className="glp-pages__empty">No saved pages yet</div>}
                  </div>
                  {renaming ? (
                    <div className="glp-pages__rename">
                      <input
                        className="glp-input"
                        autoFocus
                        defaultValue={currentName}
                        onKeyDown={(e) => { if (e.key === "Enter") renameCurrent(e.target.value); if (e.key === "Escape") setRenaming(false); }}
                      />
                      <button className="glp-smallbtn" type="button" onClick={(e) => renameCurrent(e.currentTarget.previousElementSibling.value)}>
                        Save
                      </button>
                    </div>
                  ) : (
                    <div className="glp-pages__actions">
                      <button className="glp-smallbtn" type="button" onClick={newPage}>+ New</button>
                      <button className="glp-smallbtn" type="button" disabled={sharedView || !currentId} onClick={() => setRenaming(true)}>Rename</button>
                      <button className="glp-smallbtn" type="button" onClick={duplicateCurrent}>Duplicate</button>
                      <button className="glp-smallbtn" type="button" disabled={sharedView || !currentId} onClick={deleteCurrent}>Delete</button>
                    </div>
                  )}
                </div>
              </>
            )}
          </div>
          <button className={"glp-smallbtn" + (shared ? " done" : "")} onClick={share} type="button" style={{ padding: "8px 13px" }}>
            {shared ? "✓ Link copied" : "Share link"}
          </button>
          <button className="glp-smallbtn" onClick={download} type="button" style={{ padding: "8px 13px" }}>
            Download .html
          </button>
          <button className={"glp-copy" + (copied ? " done" : "")} onClick={copy} type="button">
            {copied ? "✓ Copied" : "Copy HTML"}
          </button>
        </div>
      </div>

      {sharedView && (
        <div className="glp-banner">
          <span>You're viewing a shared design — it won't be kept until you add it to your pages.</span>
          <button className="glp-smallbtn" type="button" onClick={saveSharedAsPage}>Save as a page</button>
        </div>
      )}

      <div className="glp-main">
        {tab === "build" ? (
          <>
            <div className="glp-side">
              {override !== null && (
                <div className="glp-banner" style={{ borderRadius: 10, border: "1px solid rgba(227,177,104,.3)", marginBottom: 16 }}>
                  <span>Manual code edits are active — "Copy HTML" exports your edited code, not these settings.</span>
                  <button className="glp-smallbtn" type="button" onClick={() => setOverride(null)}>
                    Discard edits
                  </button>
                </div>
              )}

              <NavSection id="theme" label="Theme Editor" openNav={openNav} setOpenNav={setOpenNav}>
                <div className="glp-sub" style={{ marginTop: 4 }}>Quick start</div>
                <div className="glp-presets">
                  {PRESETS.map((p) => (
                    <button key={p.key} type="button" className="glp-preset" title={p.hint} onClick={() => applyPreset(p)}>
                      <b>{p.label}</b>
                      <span>{p.hint}</span>
                    </button>
                  ))}
                </div>

                <div className="glp-sub">Global card style</div>
                <div className="glp-note" style={{ marginBottom: 12 }}>
                  The default look for every card section set to <b>Global</b>. Individual sections can override it by switching to <b>Custom</b>.
                </div>
                <CardStyleControls style={config.cardStyle || DEFAULT_STYLE} setStyle={setCardStyle} />

                <div className="glp-sub">Typography</div>
                {Object.entries(FONTS).map(([key, f]) => (
                  <button key={key} type="button" className={"glp-font" + (config.fonts === key ? " on" : "")} onClick={() => patch({ fonts: key })}>
                    <span className="glp-font__aa" style={{ fontFamily: f.display }}>
                      Aa
                    </span>
                    <span>
                      <span className="glp-font__name">{f.label}</span>
                      <span className="glp-font__hint">{f.hint}</span>
                    </span>
                  </button>
                ))}

                <div className="glp-sub">Colors</div>
                <label className="glp-toggle" style={{ paddingTop: 0 }}>
                  <input type="checkbox" checked={!!config.theme.matchReadme} onChange={(e) => setTheme({ matchReadme: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Match the colors from your ReadMe dash</b>
                    <span>Every accent inherits your hub's brand color (ReadMe's <code>--color-link-primary</code>) so it matches your Appearance settings and adapts to light/dark automatically.</span>
                  </span>
                </label>
                {!config.theme.matchReadme && (
                  <>
                    <label className="glp-toggle" style={{ paddingTop: 0 }}>
                      <input type="checkbox" checked={config.theme.uniform} onChange={(e) => setTheme({ uniform: e.target.checked })} />
                      <span className="glp-toggle__text">
                        <b>Use one accent color for every card</b>
                        <span>Overrides the per-card accent choices with a single color across all sections.</span>
                      </span>
                    </label>
                    {config.theme.uniform && (
                      <Field label="Accent color">
                        <AccentSwatches
                          selected={config.theme.accent}
                          onSelect={(k) => setTheme({ accent: k })}
                          customCard={{ customLight: config.theme.customLight, customDark: config.theme.customDark }}
                          onCustom={setTheme}
                        />
                      </Field>
                    )}
                  </>
                )}

                <div className="glp-sub">Page width</div>
                <Field label="Maximum content width">
                  <Seg
                    value={config.layout.maxW}
                    onChange={(v) => setLayout({ maxW: v })}
                    options={[
                      { value: 960, label: "Narrow" },
                      { value: 1120, label: "Default" },
                      { value: 1280, label: "Wide" },
                    ]}
                  />
                </Field>
              </NavSection>

              <NavSection id="hero" label="Header & Hero" openNav={openNav} setOpenNav={setOpenNav}>
                <div className="glp-sub" style={{ marginTop: 4 }}>Header</div>
                <Field label="Search &amp; Ask AI placement (Ask AI always sits beside search)">
                  <Seg
                    value={config.searchMode}
                    onChange={(v) => patch({ searchMode: v })}
                    options={[
                      { value: "native", label: "Native header" },
                      { value: "header", label: "Centered in header" },
                      { value: "hero", label: "Under hero" },
                    ]}
                  />
                </Field>
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.flattenHeader} onChange={(e) => patch({ flattenHeader: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Transparent single-row header</b>
                    <span>Removes the header background and second nav row on this page only.</span>
                  </span>
                </label>
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.headerImage.enabled} onChange={(e) => setHeaderImage({ enabled: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Hero background image</b>
                    <span>Full-bleed image behind the hero — pair with the transparent header so it sits behind that too.</span>
                  </span>
                </label>
                {config.headerImage.enabled && (
                  <>
                    <Field label="Image URL">
                      <input className="glp-input" value={config.headerImage.url} onChange={(e) => setHeaderImage({ url: e.target.value })} placeholder="https://…/banner.jpg" />
                    </Field>
                    <Slider label="Image height" value={config.headerImage.height} min={160} max={720} step={4} onChange={(v) => setHeaderImage({ height: v })} />
                    <Slider label="Header overlap (how far it tucks up behind the header)" value={config.headerImage.offset} min={0} max={160} step={4} onChange={(v) => setHeaderImage({ offset: v })} />
                    <Slider label="Darken (tint)" value={config.headerImage.tint} min={0} max={80} unit="%" onChange={(v) => setHeaderImage({ tint: v })} />
                  </>
                )}

                <div className="glp-sub">Hero</div>
                <Field label="Eyebrow (small caps line above the title — blank to hide)">
                  <input
                    className="glp-input"
                    value={config.hero.eyebrow}
                    onChange={(e) => setHero({ eyebrow: e.target.value })}
                    placeholder="e.g. Documentation center"
                  />
                </Field>
                <div className="glp-row2">
                  <Field label="Announcement chip (blank to hide)">
                    <input
                      className="glp-input"
                      value={config.hero.chip}
                      onChange={(e) => setHero({ chip: e.target.value })}
                      placeholder="e.g. v2.4 is now available"
                    />
                  </Field>
                  <Field label="Chip link (optional)">
                    <input className="glp-input" value={config.hero.chipHref} onChange={(e) => setHero({ chipHref: normPath(e.target.value) })} placeholder="/changelog" />
                  </Field>
                </div>
                <Field label="Page title">
                  <input className="glp-input" value={config.hero.title} onChange={(e) => setHero({ title: e.target.value })} />
                </Field>
                <Slider label="Title size" value={config.hero.titleSize != null ? config.hero.titleSize : (config.hero.align === "left" ? 42 : 38)} min={22} max={72} onChange={(v) => setHero({ titleSize: v })} />
                <Field label="Subtitle">
                  <textarea className="glp-textarea" value={config.hero.subtitle} onChange={(e) => setHero({ subtitle: e.target.value })} />
                </Field>
                <Slider label="Subtitle size" value={config.hero.subtitleSize != null ? config.hero.subtitleSize : 15} min={12} max={26} onChange={(v) => setHero({ subtitleSize: v })} />
                <Field label="Alignment">
                  <Seg
                    value={config.hero.align}
                    onChange={(v) => setHero({ align: v })}
                    options={[
                      { value: "center", label: "Centered" },
                      { value: "left", label: "Left" },
                    ]}
                  />
                </Field>
                <Slider label="Vertical padding (space above &amp; below the hero text)" value={config.hero.padY || 0} min={0} max={160} step={4} onChange={(v) => setHero({ padY: v })} />
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.hero.buttons} onChange={(e) => setHero({ buttons: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Hero buttons</b>
                    <span>Primary + secondary call-to-action under the subtitle.</span>
                  </span>
                </label>
                {config.hero.buttons && (
                  <>
                    <div className="glp-row2">
                      <Field label="Primary label">
                        <input
                          className="glp-input"
                          value={config.hero.btnPrimary.label}
                          onChange={(e) => setHero({ btnPrimary: { ...config.hero.btnPrimary, label: e.target.value } })}
                        />
                      </Field>
                      <Field label="Primary link">
                        <input
                          className="glp-input"
                          value={config.hero.btnPrimary.href}
                          onChange={(e) => setHero({ btnPrimary: { ...config.hero.btnPrimary, href: normPath(e.target.value) } })}
                        />
                      </Field>
                    </div>
                    <div className="glp-row2">
                      <Field label="Secondary label">
                        <input
                          className="glp-input"
                          value={config.hero.btnSecondary.label}
                          onChange={(e) => setHero({ btnSecondary: { ...config.hero.btnSecondary, label: e.target.value } })}
                        />
                      </Field>
                      <Field label="Secondary link">
                        <input
                          className="glp-input"
                          value={config.hero.btnSecondary.href}
                          onChange={(e) => setHero({ btnSecondary: { ...config.hero.btnSecondary, href: normPath(e.target.value) } })}
                        />
                      </Field>
                    </div>
                  </>
                )}
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.ticker.enabled} onChange={(e) => setTicker({ enabled: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Announcement ticker</b>
                    <span>Scrolling marquee strip at the very top.</span>
                  </span>
                </label>
                {config.ticker.enabled && (
                  <Field label="Ticker text (repeats automatically)">
                    <input className="glp-input" value={config.ticker.text} onChange={(e) => setTicker({ text: e.target.value })} />
                  </Field>
                )}
              </NavSection>

              <NavSection id="sections" label="Sections" openNav={openNav} setOpenNav={setOpenNav}>
                {config.sections.map((section, i) => (
                  <SectionEditor
                    key={section.id}
                    section={section}
                    index={i}
                    count={config.sections.length}
                    hideAccents={config.theme.uniform || config.theme.matchReadme}
                    globalStyle={config.cardStyle || DEFAULT_STYLE}
                    open={openSection === section.id}
                    onToggle={() => setOpenSection(openSection === section.id ? null : section.id)}
                    onMove={(dir) => moveSection(section.id, dir)}
                    onRemove={() => removeSection(section.id)}
                    onDuplicate={() => duplicateSection(section.id)}
                    onChange={(next) => updateSection(section.id, next)}
                    cardOps={cardOpsFor(section.id)}
                    openCard={openCard}
                    setOpenCard={setOpenCard}
                  />
                ))}
                <button className="glp-add" type="button" onClick={addSection} disabled={config.sections.length >= 6}>
                  + Add section ({config.sections.length}/6)
                </button>
              </NavSection>

              <NavSection id="banner" label="Contact banner" openNav={openNav} setOpenNav={setOpenNav}>
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.banner.enabled} onChange={(e) => setBanner({ enabled: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Show a banner below the cards</b>
                    <span>Full-width call-to-action, e.g. "Need help building your integration?"</span>
                  </span>
                </label>
                {config.banner.enabled && (
                  <>
                    <Field label="Banner title">
                      <input className="glp-input" value={config.banner.title} onChange={(e) => setBanner({ title: e.target.value })} />
                    </Field>
                    <Field label="Banner text">
                      <textarea className="glp-textarea" value={config.banner.text} onChange={(e) => setBanner({ text: e.target.value })} />
                    </Field>
                    <div className="glp-row2">
                      <Field label="Button label">
                        <input className="glp-input" value={config.banner.btnLabel} onChange={(e) => setBanner({ btnLabel: e.target.value })} />
                      </Field>
                      <Field label="Button link">
                        <input className="glp-input" value={config.banner.btnHref} onChange={(e) => setBanner({ btnHref: normPath(e.target.value) })} />
                      </Field>
                    </div>
                  </>
                )}
              </NavSection>

              <NavSection id="footer" label="Footer" openNav={openNav} setOpenNav={setOpenNav}>
                <Field label="Footer line (blank to hide)">
                  <input className="glp-input" value={config.footer} onChange={(e) => patch({ footer: e.target.value })} />
                </Field>
              </NavSection>
            </div>
            <Preview html={generated} mode={mode} setMode={setMode} device={device} setDevice={setDevice} liquidNote={hasLiquid} focusIndex={(() => { const fi = config.sections.findIndex((s) => s.id === openSection); return fi >= 0 ? fi : null; })()} />
          </>
        ) : (
          <>
            <div className="glp-code">
              {override !== null && (
                <div className="glp-banner">
                  <span>Edited by hand — builder changes won't apply until you sync.</span>
                  <button className="glp-smallbtn" type="button" onClick={() => setOverride(null)}>
                    Sync from builder
                  </button>
                </div>
              )}
              <div className="glp-code__bar">
                <span className="glp-view__label">Raw HTML{hasLiquid && !override ? " + Liquid" : ""}</span>
                {hasLiquid && !override && <span className="glp-chip glp-chip--liquid">liquid</span>}
                <span className={"glp-chip" + (override !== null ? " glp-chip--warn" : "")}>
                  {override !== null ? "manual edits" : "generated from builder"}
                </span>
                <span className="glp-chip">{(exportHtml.length / 1024).toFixed(1)} KB</span>
              </div>
              <textarea spellCheck={false} value={exportHtml} onChange={(e) => setOverride(e.target.value)} />
            </div>
            <Preview html={exportHtml} mode={mode} setMode={setMode} device={device} setDevice={setDevice} liquidNote={hasLiquid && !override} />
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
