/* ============================================================
   GLP Builder v4 — visual editor for ReadMe Enterprise
   Global Landing Pages.

   New in v4:
   - Templates removed → fully granular per-card style switches
   - Multiple card sections, each with its own heading, intro,
     alignment, card style, grid, and card source
   - Font Awesome icons on cards (alongside emoji)
   - Three search placements: native / centered-in-header / under-hero
   - Optional header background image (between header + subnav)
   ============================================================ */

/* ---------------- accent presets (light / dark pairs) ---------------- */
const ACCENTS = {
  green: { label: "Green", light: "#0C7A66", dark: "#34C98E" },
  purple: { label: "Purple", light: "#5B48D0", dark: "#A49AF0" },
  amber: { label: "Amber", light: "#9C6212", dark: "#E3B168" },
  blue: { label: "Blue", light: "#0B63C5", dark: "#6FB4F5" },
  rose: { label: "Rose", light: "#B4235A", dark: "#F087AE" },
  slate: { label: "Slate", light: "#47566B", dark: "#A3B2C7" },
};

/* ---------------- font pairing presets ----------------
   `readme` inherits the hub's own typeface via ReadMe's --font-family

/* ---------------- granular card style ----------------
   Every card look is composed from these switches instead of
   a fixed template. Feature flags control markup emission;
   density/radius/mono drive scalar CSS via per-section vars.

   anchor  : whole card is an <a> (else <div> + CTA <a>)
   icon    : icon tile (emoji or Font Awesome)
   badge   : eyebrow pill w/ dot|lock
   num     : auto-numbered (01, 02, …)
   file    : File_0N label (terminal style)
   bar     : 3px accent top bar
   peek    : preview list section
   cta     : CTA button/link shown
   ctaPlain: CTA is a plain text link
   mono    : mono, uppercase titles (terminal aesthetic)
   radius  : corner radius (px)
   density : roomy | comfortable | compact (padding + title size)
------------------------------------------------------ */
const DEFAULT_STYLE = {
  anchor: true,
  icon: false,
  badge: true,
  num: false,
  file: false,
  bar: true,
  peek: true,
  cta: true,
  ctaPlain: false,
  mono: false,
  radius: 16,

};

/* old template → granular style, used only when migrating saved configs */
const TEMPLATE_TO_STYLE = {

  solutions:  { anchor: false, icon: true,  badge: false, num: false, file: false, bar: true,  peek: true,  cta: true,  ctaPlain: false, mono: false, radius: 16, density: "comfortable" },
  launchpad:  { anchor: false, icon: false, badge: false, num: true,  file: false, bar: true,  peek: true,  cta: true,  ctaPlain: false, mono: false, radius: 16, density: "comfortable" },
  bento:      { anchor: false, icon: true,  badge: false, num: false, file: false, bar: true,  peek: true,  cta: true,  ctaPlain: false, mono: false, radius: 16, density: "comfortable" },
  helpcenter: { anchor: true,  icon: false, badge: false, num: false, file: false, bar: false, peek: false, cta: false, ctaPlain: false, mono: false, radius: 12, density: "compact" },
  tiles:      { anchor: true,  icon: false, badge: true,  num: false, file: false, bar: true,  peek: false, cta: false, ctaPlain: false, mono: false, radius: 16, density: "compact" },
  archive:    { anchor: true,  icon: false, badge: false, num: false, file: true,  bar: true,  peek: false, cta: true,  ctaPlain: true,  mono: true,  radius: 4,  density: "comfortable" },

const LOCK_SVG =

let _uid = 10;
const uid = () => "c" + _uid++;

const CARD_DEFAULTS = {

/* ---------------- default config = Benak's v3 page ---------------- */
const DEFAULT_CONFIG = {

  hero: {

        },

        },

/* ---------------- helpers ---------------- */
const esc = (s = "") =>
  String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");

const cardAccent = (card) =>
  card.accent === "custom"
    ? { light: card.customLight, dark: card.customDark }
    : { light: (ACCENTS[card.accent] || ACCENTS.green).light, dark: (ACCENTS[card.accent] || ACCENTS.green).dark };

/* auto-prepend "/" to link paths (leaves full URLs and #anchors alone) */
const normPath = (v) => (!v || /^[/#]/.test(v) || /^https?:/i.test(v) ? v : "/" + v);

/* Font Awesome <i> markup (emoji falls back to the raw character) */
const iconMarkup = (o) =>
  o && o.iconType === "fa"
    ? `<i class="fa-${o.faStyle || "solid"} fa-${esc(String(o.icon || "").replace(/^fa-/, ""))}" aria-hidden="true"></i>`
    : esc(o ? o.icon : "");

const encodeConfig = (cfg) => btoa(unescape(encodeURIComponent(JSON.stringify(cfg))));
const decodeConfig = (s) => JSON.parse(decodeURIComponent(escape(atob(s))));

/* ---------------- config migration / normalization ---------------- */
const normCard = (c) => ({ ...CARD_DEFAULTS, ...c, id: c.id || uid() });

const normSection = (s) => ({
  id: s.id || uid(),
  heading: s.heading || "",
  intro: s.intro || "",
  align: s.align === "left" ? "left" : "center",
  source: s.source === "liquid" ? "liquid" : "static",
  style: { ...DEFAULT_STYLE, ...(s.style || {}) },
  layout: { ...DEFAULT_SECTION_LAYOUT, ...(s.layout || {}) },
  liquid: { ...DEFAULT_LIQUID, ...(s.liquid || {}) },
  cards: (s.cards && s.cards.length ? s.cards : DEFAULT_CONFIG.sections[0].cards).map(normCard),
});

/* merge a (possibly older/partial) shared config over the defaults */
function migrateConfig(loaded) {
  const D = DEFAULT_CONFIG;
  const base = {
    fonts: loaded.fonts || D.fonts,
    hero: { ...D.hero, ...(loaded.hero || {}) },
    ticker: { ...D.ticker, ...(loaded.ticker || {}) },
    searchMode: loaded.searchMode || (loaded.moveSearch === false ? "native" : "hero"),
    flattenHeader: loaded.flattenHeader !== false,
    headerImage: { ...D.headerImage, ...(loaded.headerImage || {}) },
    layout: { maxW: (loaded.layout && loaded.layout.maxW) || 1120 },
    banner: { ...D.banner, ...(loaded.banner || {}) },
    footer: loaded.footer != null ? loaded.footer : D.footer,
  };

  /* already v4 (has sections) */
  if (loaded.sections && loaded.sections.length) {
    return { ...base, sections: loaded.sections.map(normSection) };
  }

  /* migrate v3 (single template + flat cards) into one section */
  const grid = loaded.layout || {};
  const section = normSection({
    heading: (loaded.section && loaded.section.title) || "",
    intro: (loaded.section && loaded.section.text) || "",
    align: loaded.hero && loaded.hero.align === "left" ? "left" : "center",
    source: loaded.liquid && loaded.liquid.enabled ? "liquid" : "static",
    style: TEMPLATE_TO_STYLE[loaded.template] || DEFAULT_STYLE,
    layout: {
      colMin: grid.colMin || 258,
      gap: grid.gap || 20,
      autoH: !!grid.autoH,
      cardMinH: grid.cardMinH || 396,
      bento: loaded.template === "bento",
    },
    liquid: loaded.liquid || {},
    cards: loaded.cards || [],
  });
  return { ...base, sections: [section] };
}

/* ============================================================
   HTML GENERATOR
   ============================================================ */
const INLINE_CARD_STYLE =
  'style="background-color: var(--card-bg) !important; background: var(--card-bg) !important; border: 1px solid var(--card-border) !important; border-radius: var(--card-radius) !important; box-shadow: var(--card-shadow) !important; backdrop-filter: var(--card-blur) !important; -webkit-backdrop-filter: var(--card-blur) !important;"';

/* card markup builder — used for both static cards and the Liquid loop
   (vars are either literal strings or Liquid tags) */
function buildCard(v, style) {
  const primaryCls = v.primary ? " bnk-card--primary" : "";
  const openTag = style.anchor
    ? `<a class="bnk-card ${v.accentClass}${primaryCls}" href="${v.href}"\n       ${INLINE_CARD_STYLE}>`
    : `<div class="bnk-card ${v.accentClass}${primaryCls}"\n       ${INLINE_CARD_STYLE}>`;
  const closeTag = style.anchor ? "</a>" : "</div>";

  let inner = "";
  if (style.file) inner += `\n      <span class="bnk-card__eyebrow">${v.fileLabel}</span>`;
  else if (style.badge) inner += `\n      <span class="bnk-card__eyebrow">${v.badgeHtml}${v.eyebrow}</span>`;
  if (style.num) inner += `\n      <span class="bnk-card__num">${v.num}</span>`;
  if (style.icon) inner += `\n      <span class="bnk-card__icon" aria-hidden="true">${v.icon}</span>`;
  inner += `\n      <span class="bnk-card__title">${v.title}</span>`;
  inner += `\n      <span class="bnk-card__blurb">${v.blurb}</span>`;
  if (style.peek && v.peekHtml) inner += `\n${v.peekHtml}`;
  if (style.cta) {
    const ctaCls = style.ctaPlain
      ? "bnk-card__go bnk-card__go--plain"
      : `bnk-card__go bnk-card__go--${v.ctaStyle === "filled" ? "filled" : "ghost"}`;
    inner += style.anchor
      ? `\n      <span class="${ctaCls}">${v.ctaText}<span class="rm-arrow" aria-hidden="true">&#8594;</span></span>`
      : `\n      <a class="${ctaCls}" href="${v.href}">${v.ctaText}<span class="rm-arrow" aria-hidden="true">&#8594;</span></a>`;
  } else if (style.anchor) {
    /* whole-card link with no CTA → trailing arrow (compact "tiles" feel) */
    inner += `\n      <span class="rm-arrow bnk-card__arrow" aria-hidden="true">&#8594;</span>`;
  }

  return `    <!-- ${v.comment} -->\n    ${openTag}${inner}\n    ${closeTag}`;
}

function staticPeek(c) {
  const items = c.peekItems.filter((p) => p.trim());
  if (!items.length) return "";
  return `      <span class="bnk-card__peek">
        <span class="bnk-card__peek-label">${esc(c.peekLabel)}</span>
${items
  .map((p) => `        <span class="bnk-card__peek-item">${c.peekArrows ? '<span class="bnk-tick">&#8594;</span>' : ""}${esc(p)}</span>`)
  .join("\n")}
      </span>`;
}

/* build the cards for one section — static list or a Liquid loop */
function sectionCards(sec, palette) {
  const N = Math.max(1, palette.length);
  if (sec.source !== "liquid") {
    return sec.cards
      .map((c, i) =>
        buildCard(
          {
            accentClass: `bnk-card--a${i}`,
            primary: c.primary,
            href: esc(c.href),
            eyebrow: esc(c.eyebrow),
            badgeHtml: c.badge === "lock" ? LOCK_SVG : '<span class="bnk-dot"></span>',
            icon: iconMarkup(c),
            num: String(i + 1).padStart(2, "0"),
            fileLabel: `File_${String(i + 1).padStart(2, "0")}${c.eyebrow.trim() ? " // " + esc(c.eyebrow) : ""}`,
            title: esc(c.title),
            blurb: esc(c.blurb),
            peekHtml: staticPeek(c),
            ctaText: esc(c.ctaText),
            ctaStyle: c.ctaStyle,
            comment: `Card ${i + 1} — ${esc(c.title)}`,
          },
          sec.style
        )
      )
      .join("\n\n");
  }

  const Q = sec.liquid;
  const liquidPeek = Q.peek
    ? `      <span class="bnk-card__peek">
        <span class="bnk-card__peek-label">${esc(Q.peekLabel)}</span>
        {% for category in child.guides limit: ${Q.peekCount} %}
        <span class="bnk-card__peek-item">{{ category.title }}</span>
        {% endfor %}
      </span>`
    : "";
  const inner = buildCard(
    {
      accentClass: "bnk-card--a{{ ai }}",
      primary: false,
      href: "/{{ child.subpath }}",
      eyebrow: esc(Q.eyebrow),
      badgeHtml: Q.badge === "lock" ? LOCK_SVG : '<span class="bnk-dot"></span>',
      icon: iconMarkup(Q),
      num: "{% if forloop.index < 10 %}0{% endif %}{{ forloop.index }}",
      fileLabel: `File_{% if forloop.index < 10 %}0{% endif %}{{ forloop.index }}${Q.eyebrow.trim() ? " // " + esc(Q.eyebrow) : ""}`,
      title: "{{ child.name }}",
      blurb: `{{ child.description | default: "${esc(Q.blurbFallback)}" }}`,
      peekHtml: liquidPeek,
      ctaText: esc(Q.ctaText),
      ctaStyle: Q.ctaStyle,
      comment: "One card per child project (Liquid)",
    },
    sec.style
  );
  return `    {% for child in parentProject.childrenProjects %}
    {% assign ai = forloop.index0 | modulo: ${N} %}
${inner}
    {% endfor %}`;
}

const densityPad = (d) => (d === "compact" ? "19px 20px 18px" : d === "comfortable" ? "26px 26px 24px" : "25px 25px 23px");
const densityTitle = (d) => (d === "compact" ? "16.5px" : d === "comfortable" ? "21px" : "30px");

function generateHTML(cfg) {
  const F = FONTS[cfg.fonts] || FONTS.grotesk;
  const L = cfg.layout;
  const sections = cfg.sections;
  const heroLeft = cfg.hero.align === "left";
  const hasLiquid = sections.some((s) => s.source === "liquid");

  /* per-section accent palettes */
  const palettes = sections.map((sec) => {
    const p =
      sec.source === "liquid"
        ? sec.liquid.accents.map((k) => ACCENTS[k] || ACCENTS.green)
        : sec.cards.map((c) => cardAccent(c));
    return p.length ? p : [ACCENTS.green];
  });
  const primary = palettes[0][0];

  /* accent CSS vars, scoped per section */
  const lightAccents = sections
    .map((_, i) => palettes[i].map((a, j) => `    --bnk-s${i}a${j}: ${a.light};`).join("\n"))
    .join("\n");
  const darkAccents = (pad) =>
    sections.map((_, i) => palettes[i].map((a, j) => `${pad}--bnk-s${i}a${j}: ${a.dark};`).join("\n")).join("\n");
  const accentRules = sections
    .map((_, i) => palettes[i].map((__, j) => `  .bnk-sec-${i} .bnk-card--a${j} { --accent: var(--bnk-s${i}a${j}); }`).join("\n"))
    .join("\n");

  /* per-section grids */
  const gridRules = sections
    .map((sec, i) =>
      sec.layout.bento
        ? `  .bnk-sec-${i} .bnk-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: ${sec.layout.gap}px;
  }
  .bnk-sec-${i} .bnk-grid > *:nth-child(4n+1) { grid-column: span 4; }
  .bnk-sec-${i} .bnk-grid > *:nth-child(4n+2) { grid-column: span 2; }
  .bnk-sec-${i} .bnk-grid > *:nth-child(4n+3) { grid-column: span 2; }
  .bnk-sec-${i} .bnk-grid > *:nth-child(4n)   { grid-column: span 4; }
  @media (max-width: 760px) { .bnk-sec-${i} .bnk-grid > * { grid-column: 1 / -1 !important; } }`
        : `  .bnk-sec-${i} .bnk-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(${sec.layout.colMin}px, 1fr));
    gap: ${sec.layout.gap}px;
  }`
    )
    .join("\n");

  /* ---------- optional CSS blocks ---------- */
  const headerCSS = cfg.flattenHeader
    ? `
  /* ===== Native header (landing page only): transparent + single row ===== */
  .rm-Header {
    background: transparent !important;
    background-color: transparent !important;
    box-shadow: none !important;
  }
  .rm-Header-bottom { display: none !important; }
  .rm-Header-top { border-bottom: 0 !important; }
`
    : "";

  const heroImageCSS = cfg.headerImage.enabled
    ? `
  /* ===== Background image behind the hero (peeks behind a flattened, transparent header) ===== */
  .bnk-herobg {
    position: absolute;

   ReadMe renders the real Liquid server-side; here we substitute
   sample child projects so the preview looks real. Handles any
   number of per-section child-project loops.
   ============================================================ */
const SAMPLE_PROJECTS = [
  { name: "Payments API", subpath: "payments", desc: "Accept payments, manage refunds, and reconcile settlements." },
  { name: "Identity", subpath: "identity", desc: "SSO, MFA, and user permission management for your apps." },
  { name: "Client SDKs", subpath: "sdks", desc: "Official libraries for Node, Python, Go, and React Native." },
];
const SAMPLE_CATEGORIES = ["Getting started", "Authentication", "Webhooks"];

function expandLiquidForPreview(html) {
  if (!html.includes("{%")) return html;
  let out = html;

  /* inner loop: guide categories (global — same sample list for every card) */
  out = out.replace(/\{%-?\s*for category in child\.guides[^%]*%\}([\s\S]*?)\{%-?\s*endfor\s*-?%\}/g, (_, inner) =>
    SAMPLE_CATEGORIES.map((cat) => inner.replace(/\{\{\s*category\.title\s*\}\}/g, cat)).join("")
  );

  /* outer loops: child projects — each loop carries its own `modulo: N` */
  out = out.replace(/\{%-?\s*for child in parentProject\.childrenProjects\s*-?%\}([\s\S]*?)\{%-?\s*endfor\s*-?%\}/g, (_, block) => {
    const nm = block.match(/modulo:\s*(\d+)/);
    const N = nm ? Math.max(1, parseInt(nm[1], 10)) : 3;
    const body = block.replace(/\{%-?\s*assign[^%]*%\}\n?/g, "");
    return SAMPLE_PROJECTS.map((p, i) =>
      body
        .replace(/\{%\s*if forloop\.index < 10\s*%\}0\{%\s*endif\s*%\}/g, "0")
        .replace(/\{\{\s*forloop\.index0\s*\}\}/g, String(i))
        .replace(/\{\{\s*forloop\.index\s*\}\}/g, String(i + 1))
        .replace(/\{\{\s*ai\s*\}\}/g, String(i % N))
        .replace(/\{\{\s*child\.name\s*\}\}/g, p.name)
        .replace(/\{\{\s*child\.subpath\s*\}\}/g, p.subpath)
        .replace(/\{\{\s*child\.description[^}]*\}\}/g, p.desc)
    ).join("\n");
  });

  /* parent tokens + anything left over */
  out = out
    .replace(/\{\{\s*parentProject\.name\s*\}\}/g, "Benak Group")
    .replace(/\{\{\s*parentProject\.description[^}]*\}\}/g, "All product documentation in one place.");
  return out;
}

/* ---------- small reusable inputs ---------- */
function Field({ label, children }) {
  return (
    <div className="glp-field">
      <label>{label}</label>
      {children}
    </div>
  );
}

function Seg({ value, options, onChange }) {
  return (
    <div className="glp-seg">
      {options.map((o) => (
        <button key={o.value} className={value === o.value ? "on" : ""} onClick={() => onChange(o.value)} type="button">
          {o.label}
        </button>
      ))}
    </div>
  );
}

function Slider({ label, value, min, max, step = 1, unit = "px", onChange }) {
  return (
    <Field label={label}>
      <div className="glp-slider">
        <input type="range" min={min} max={max} step={step} value={value} onChange={(e) => onChange(Number(e.target.value))} />
        <output>
          {value}
          {unit}
        </output>
      </div>
    </Field>
  );
}

function StyleCheck({ checked, label, onChange }) {
  return (
    <label className="glp-check">
      <input type="checkbox" checked={checked} onChange={(e) => onChange(e.target.checked)} />
      {label}
    </label>
  );
}

/* icon input — emoji character or a Font Awesome icon name + style */
function IconField({ label, obj, onChange }) {
  const type = obj.iconType || "emoji";
  return (
    <Field label={label}>
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        <Seg
          value={type}
          onChange={(v) => onChange({ iconType: v })}
          options={[
            { value: "emoji", label: "Emoji" },
            { value: "fa", label: "Font Awesome" },
          ]}
        />
        {type === "emoji" ? (
          <input className="glp-input" style={{ width: 80 }} value={obj.icon} onChange={(e) => onChange({ icon: e.target.value })} />
        ) : (
          <>
            <input
              className="glp-input"
              style={{ flex: 1, minWidth: 110 }}
              value={obj.icon}
              onChange={(e) => onChange({ icon: e.target.value })}
              placeholder="e.g. rocket, book-open"
            />
            <select className="glp-select" style={{ width: 104 }} value={obj.faStyle || "solid"} onChange={(e) => onChange({ faStyle: e.target.value })}>
              <option value="solid">Solid</option>
              <option value="regular">Regular</option>
              <option value="light">Light</option>
              <option value="brands">Brands</option>
            </select>
          </>
        )}
      </div>
      {type === "fa" && (
        <div style={{ fontSize: 11, color: "var(--ink-3)", marginTop: 5, lineHeight: 1.45 }}>
          Font Awesome icon name without the <code>fa-</code> prefix. Light &amp; duotone are Pro-only and may not show in the preview.
        </div>
      )}
    </Field>
  );
}

              style={{ background: `linear-gradient(135deg, ${a.light} 50%, ${a.dark} 50%)` }}
              onClick={() => onSelect(key)}
            />
          );
        })}
        {!multi && onCustom && (
          <button
            type="button"
            title="Custom"
            className={"glp-swatch glp-swatch--custom" + (selected === "custom" ? " on" : "")}
            onClick={() => onSelect("custom")}
          >
            custom
          </button>
        )}
      </div>
      {!multi && selected === "custom" && customCard && (
        <div className="glp-custom-pair">
          <input type="color" value={customCard.customLight} onChange={(e) => onCustom({ customLight: e.target.value })} />
          <span>light mode</span>
          <input type="color" value={customCard.customDark} onChange={(e) => onCustom({ customDark: e.target.value })} />
          <span>dark mode (use a brighter shade)</span>
        </div>
      )}
    </>
  );
}

/* ---------- card editor ---------- */

/* ---------- section editor ---------- */
function SectionEditor({ section, index, count, open, onToggle, onMove, onRemove, onChange, cardOps, openCard, setOpenCard }) {
  const set = (patch) => onChange({ ...section, ...patch });
  const setStyle = (patch) => onChange({ ...section, style: { ...section.style, ...patch } });

  const st = section.style;
  const liquidOn = section.source === "liquid";
  const toggleLiqAccent = (key) =>
    setLiq({
      accents: section.liquid.accents.includes(key)
        ? section.liquid.accents.length > 1
          ? section.liquid.accents.filter((k) => k !== key)

        <button className="glp-iconbtn" title="Move up" disabled={index === 0}
          onClick={(e) => { e.stopPropagation(); onMove(-1); }} type="button">&#8593;</button>
        <button className="glp-iconbtn" title="Move down" disabled={index === count - 1}

          </Field>

          </Field>
          <Field label="Text alignment (independent of the hero)">
            <Seg
              value={section.align}
              onChange={(v) => set({ align: v })}
              options={[
                { value: "center", label: "Centered" },
                { value: "left", label: "Left" },

            <StyleCheck checked={!!st.badge} label="Badge / eyebrow" onChange={(v) => setStyle({ badge: v })} />
            <StyleCheck checked={!!st.num} label="Number (01)" onChange={(v) => setStyle({ num: v })} />

            <StyleCheck checked={!!st.peek} label="Preview list" onChange={(v) => setStyle({ peek: v })} />
            <StyleCheck checked={!!st.cta} label="CTA button" onChange={(v) => setStyle({ cta: v })} />
            <StyleCheck checked={!!st.ctaPlain} label="Plain-text CTA" onChange={(v) => setStyle({ ctaPlain: v })} />
            <StyleCheck checked={!!st.anchor} label="Whole card links" onChange={(v) => setStyle({ anchor: v })} />

          </div>
          <Field label="Card density">
            <Seg
              value={st.density}
              onChange={(v) => setStyle({ density: v })}
              options={[

                { value: "comfortable", label: "Comfortable" },
                { value: "compact", label: "Compact" },
              ]}

          </Field>

          <div className="glp-sub">Grid</div>
          <label className="glp-toggle" style={{ paddingTop: 0 }}>
            <input type="checkbox" checked={section.layout.bento} onChange={(e) => setLay({ bento: e.target.checked })} />
            <span className="glp-toggle__text">
              <b>Bento grid</b>
              <span>Asymmetric mixed-size 6-column layout.</span>
            </span>
          </label>
          {!section.layout.bento && (
            <Slider label="Minimum column width (cards per row)" value={section.layout.colMin} min={180} max={360} onChange={(v) => setLay({ colMin: v })} />
          )}
          <Slider label="Gap between cards" value={section.layout.gap} min={12} max={36} onChange={(v) => setLay({ gap: v })} />
          <label className="glp-toggle">
            <input type="checkbox" checked={section.layout.autoH} onChange={(e) => setLay({ autoH: e.target.checked })} />
            <span className="glp-toggle__text">
              <b>Auto card height</b>
              <span>Let content decide the height instead of a fixed minimum.</span>
            </span>
          </label>
          {!section.layout.autoH && (
            <Slider label="Card minimum height" value={section.layout.cardMinH} min={140} max={520} step={4} onChange={(v) => setLay({ cardMinH: v })} />
          )}

          <div className="glp-sub">Cards</div>
          <Field label="Card source">
            <Seg
              value={section.source}
              onChange={(v) => set({ source: v })}
              options={[
                { value: "static", label: "Manual cards" },
                { value: "liquid", label: "Auto from projects" },
              ]}
            />
          </Field>

          {liquidOn ? (
            <LiquidControls section={section} setLiq={setLiq} toggleLiqAccent={toggleLiqAccent} />
          ) : (
            <>
              {section.cards.map((card, i) => (
                <CardEditor
                  key={card.id}
                  card={card}
                  index={i}
                  count={section.cards.length}
                  style={st}
                  open={openCard === card.id}
                  onToggle={() => setOpenCard(openCard === card.id ? null : card.id)}
                  onChange={(next) => cardOps.set(card.id, next)}
                  onMove={(dir) => cardOps.move(card.id, dir)}
                  onRemove={() => cardOps.remove(card.id)}
                />
              ))}
              <button className="glp-add" type="button" onClick={cardOps.add} disabled={section.cards.length >= 12}>
                + Add card ({section.cards.length}/12)
              </button>
            </>
          )}
        </div>
      )}
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [tab, setTab] = useState("build");
  const [config, setConfig] = useState(() => {
    /* hydrate from a shared link (#c=…) when present */
    try {
      const m = window.location.hash.match(/#c=([A-Za-z0-9+/=]+)/);
      if (m) return migrateConfig(decodeConfig(m[1]));
    } catch (e) {
      /* bad or absent hash — fall through to defaults */
    }
    return DEFAULT_CONFIG;
  });
  const [override, setOverride] = useState(null);
  const [openCard, setOpenCard] = useState(null);
  const [openSection, setOpenSection] = useState(() => DEFAULT_CONFIG.sections[0].id);
  const [mode, setMode] = useState("light");
  const [device, setDevice] = useState("desktop");
  const [copied, setCopied] = useState(false);
  const [shared, setShared] = useState(false);

  const generated = useMemo(() => generateHTML(config), [config]);
  const exportHtml = override ?? generated;

  const patch = (p) => setConfig((c) => ({ ...c, ...p }));
  const setHero = (p) => setConfig((c) => ({ ...c, hero: { ...c.hero, ...p } }));
  const setTicker = (p) => setConfig((c) => ({ ...c, ticker: { ...c.ticker, ...p } }));
  const setLayout = (p) => setConfig((c) => ({ ...c, layout: { ...c.layout, ...p } }));
  const setBanner = (p) => setConfig((c) => ({ ...c, banner: { ...c.banner, ...p } }));
  const setHeaderImage = (p) => setConfig((c) => ({ ...c, headerImage: { ...c.headerImage, ...p } }));

  /* ---- section ops ---- */
  const updateSection = (id, next) => setConfig((c) => ({ ...c, sections: c.sections.map((s) => (s.id === id ? next : s)) }));
  const moveSection = (id, dir) =>
    setConfig((c) => {
      const i = c.sections.findIndex((s) => s.id === id);
      const j = i + dir;
      if (j < 0 || j >= c.sections.length) return c;
      const arr = [...c.sections];
      [arr[i], arr[j]] = [arr[j], arr[i]];
      return { ...c, sections: arr };
    });
  const removeSection = (id) => setConfig((c) => (c.sections.length > 1 ? { ...c, sections: c.sections.filter((s) => s.id !== id) } : c));
  const addSection = () =>
    setConfig((c) => {
      if (c.sections.length >= 6) return c;
      const id = uid();
      const ns = {
        id,
        heading: "New section",
        intro: "",
        align: "center",
        source: "static",
        style: { ...DEFAULT_STYLE },
        layout: { ...DEFAULT_SECTION_LAYOUT },
        liquid: { ...DEFAULT_LIQUID },
        cards: [{ ...CARD_DEFAULTS, id: uid() }],
      };
      setOpenSection(id);
      return { ...c, sections: [...c.sections, ns] };
    });

  /* ---- card ops scoped to a section ---- */
  const cardOpsFor = (secId) => ({
    set: (cardId, next) =>
      setConfig((c) => ({
        ...c,
        sections: c.sections.map((s) => (s.id !== secId ? s : { ...s, cards: s.cards.map((k) => (k.id === cardId ? next : k)) })),
      })),
    move: (cardId, dir) =>
      setConfig((c) => ({
        ...c,
        sections: c.sections.map((s) => {
          if (s.id !== secId) return s;
          const i = s.cards.findIndex((k) => k.id === cardId);
          const j = i + dir;
          if (j < 0 || j >= s.cards.length) return s;
          const arr = [...s.cards];
          [arr[i], arr[j]] = [arr[j], arr[i]];
          return { ...s, cards: arr };
        }),
      })),
    remove: (cardId) =>
      setConfig((c) => ({
        ...c,
        sections: c.sections.map((s) => (s.id !== secId ? s : s.cards.length > 1 ? { ...s, cards: s.cards.filter((k) => k.id !== cardId) } : s)),
      })),
    add: () =>
      setConfig((c) => ({
        ...c,
        sections: c.sections.map((s) => {
          if (s.id !== secId) return s;
          if (s.cards.length >= 12) return s;
          const id = uid();
          setOpenCard(id);
          return { ...s, cards: [...s.cards, { ...CARD_DEFAULTS, id }] };
        }),
      })),
  });

  const copyText = async (text) => {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch (e) {
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        const ok = document.execCommand("copy");
        document.body.removeChild(ta);
        return ok;
      } catch (e2) {
        return false;
      }
    }
  };

  const copy = useCallback(async () => {
    if (await copyText(exportHtml)) {
      setCopied(true);
      setTimeout(() => setCopied(false), 1800);
    }
  }, [exportHtml]);

  const download = useCallback(() => {
    const blob = new Blob([exportHtml], { type: "text/html" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "global-landing-page.html";
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 500);
  }, [exportHtml]);

  const share = useCallback(async () => {
    const encoded = encodeConfig(config);
    let payload = encoded;
    try {
      if (/^https?:/.test(window.location.protocol)) {
        const url = window.location.origin + window.location.pathname + "#c=" + encoded;
        window.history.replaceState(null, "", "#c=" + encoded);
        payload = url;
      }
    } catch (e) {
      /* sandboxed — fall back to copying the raw config string */
    }
    if (await copyText(payload)) {
      setShared(true);
      setTimeout(() => setShared(false), 1800);
    }
  }, [config]);

  const hasLiquid = config.sections.some((s) => s.source === "liquid");

  return (
    <div className="glp">
      <style>{APP_CSS}</style>

      <div className="glp-bar">
        <div className="glp-logo">
          <div className="glp-logo__mark">GL</div>
          <div>
            <div className="glp-logo__name">GLP Builder</div>
            <div className="glp-logo__tag">Global landing pages for ReadMe Enterprise</div>
          </div>
        </div>
        <div className="glp-tabs">
          <button className={"glp-tab" + (tab === "build" ? " on" : "")} onClick={() => setTab("build")} type="button">
            BUILD
          </button>
          <button className={"glp-tab" + (tab === "code" ? " on" : "")} onClick={() => setTab("code")} type="button">
            CODE
          </button>
        </div>
        <div className="glp-bar__right">
          <button className={"glp-smallbtn" + (shared ? " done" : "")} onClick={share} type="button" style={{ padding: "8px 13px" }}>
            {shared ? "✓ Link copied" : "Share link"}
          </button>
          <button className="glp-smallbtn" onClick={download} type="button" style={{ padding: "8px 13px" }}>
            Download .html
          </button>
          <button className={"glp-copy" + (copied ? " done" : "")} onClick={copy} type="button">
            {copied ? "✓ Copied" : "Copy HTML"}
          </button>
        </div>
      </div>

      <div className="glp-main">
        {tab === "build" ? (
          <>
            <div className="glp-side">
              {override !== null && (
                <div className="glp-banner" style={{ borderRadius: 10, border: "1px solid rgba(227,177,104,.3)", marginBottom: 16 }}>
                  <span>Manual code edits are active — "Copy HTML" exports your edited code, not these settings.</span>
                  <button className="glp-smallbtn" type="button" onClick={() => setOverride(null)}>
                    Discard edits
                  </button>
                </div>
              )}

              <details className="glp-sec" open>
                <summary className="glp-sec__label">Typography</summary>
                {Object.entries(FONTS).map(([key, f]) => (
                  <button key={key} type="button" className={"glp-font" + (config.fonts === key ? " on" : "")} onClick={() => patch({ fonts: key })}>
                    <span className="glp-font__aa" style={{ fontFamily: f.display }}>
                      Aa
                    </span>
                    <span>
                      <span className="glp-font__name">{f.label}</span>
                      <span className="glp-font__hint">{f.hint}</span>
                    </span>
                  </button>
                ))}
              </details>

              <details className="glp-sec" open>
                <summary className="glp-sec__label">Hero</summary>
                <Field label="Eyebrow (small caps line above the title — blank to hide)">
                  <input
                    className="glp-input"
                    value={config.hero.eyebrow}
                    onChange={(e) => setHero({ eyebrow: e.target.value })}
                    placeholder="e.g. Documentation center"
                  />
                </Field>
                <div className="glp-row2">
                  <Field label="Announcement chip (blank to hide)">
                    <input
                      className="glp-input"
                      value={config.hero.chip}
                      onChange={(e) => setHero({ chip: e.target.value })}
                      placeholder="e.g. v2.4 is now available"
                    />
                  </Field>
                  <Field label="Chip link (optional)">
                    <input className="glp-input" value={config.hero.chipHref} onChange={(e) => setHero({ chipHref: normPath(e.target.value) })} placeholder="/changelog" />
                  </Field>
                </div>
                <Field label="Page title">
                  <input className="glp-input" value={config.hero.title} onChange={(e) => setHero({ title: e.target.value })} />
                </Field>
                <Field label="Subtitle">
                  <textarea className="glp-textarea" value={config.hero.subtitle} onChange={(e) => setHero({ subtitle: e.target.value })} />
                </Field>
                <Field label="Alignment">
                  <Seg
                    value={config.hero.align}
                    onChange={(v) => setHero({ align: v })}
                    options={[
                      { value: "center", label: "Centered" },
                      { value: "left", label: "Left" },
                    ]}
                  />
                </Field>
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.hero.buttons} onChange={(e) => setHero({ buttons: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Hero buttons</b>
                    <span>Primary + secondary call-to-action under the subtitle.</span>
                  </span>
                </label>
                {config.hero.buttons && (
                  <>
                    <div className="glp-row2">
                      <Field label="Primary label">
                        <input
                          className="glp-input"
                          value={config.hero.btnPrimary.label}
                          onChange={(e) => setHero({ btnPrimary: { ...config.hero.btnPrimary, label: e.target.value } })}
                        />
                      </Field>
                      <Field label="Primary link">
                        <input
                          className="glp-input"
                          value={config.hero.btnPrimary.href}
                          onChange={(e) => setHero({ btnPrimary: { ...config.hero.btnPrimary, href: normPath(e.target.value) } })}
                        />
                      </Field>
                    </div>
                    <div className="glp-row2">
                      <Field label="Secondary label">
                        <input
                          className="glp-input"
                          value={config.hero.btnSecondary.label}
                          onChange={(e) => setHero({ btnSecondary: { ...config.hero.btnSecondary, label: e.target.value } })}
                        />
                      </Field>
                      <Field label="Secondary link">
                        <input
                          className="glp-input"
                          value={config.hero.btnSecondary.href}
                          onChange={(e) => setHero({ btnSecondary: { ...config.hero.btnSecondary, href: normPath(e.target.value) } })}
                        />
                      </Field>
                    </div>
                  </>
                )}
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.ticker.enabled} onChange={(e) => setTicker({ enabled: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Announcement ticker</b>
                    <span>Scrolling marquee strip at the very top.</span>
                  </span>
                </label>
                {config.ticker.enabled && (
                  <Field label="Ticker text (repeats automatically)">
                    <input className="glp-input" value={config.ticker.text} onChange={(e) => setTicker({ text: e.target.value })} />
                  </Field>
                )}
              </details>

              <details className="glp-sec" open>
                <summary className="glp-sec__label">Hub chrome</summary>
                <Field label="Search &amp; Ask AI placement (Ask AI always sits beside search)">
                  <Seg
                    value={config.searchMode}
                    onChange={(v) => patch({ searchMode: v })}
                    options={[
                      { value: "native", label: "Native header" },
                      { value: "header", label: "Centered in header" },
                      { value: "hero", label: "Under hero" },
                    ]}
                  />
                </Field>
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.flattenHeader} onChange={(e) => patch({ flattenHeader: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Transparent single-row header</b>
                    <span>Removes the header background and second nav row on this page only.</span>
                  </span>
                </label>
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.headerImage.enabled} onChange={(e) => setHeaderImage({ enabled: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Hero background image</b>
                    <span>Full-bleed image behind the hero — pair with the transparent header so it sits behind that too.</span>
                  </span>
                </label>
                {config.headerImage.enabled && (
                  <>
                    <Field label="Image URL">
                      <input className="glp-input" value={config.headerImage.url} onChange={(e) => setHeaderImage({ url: e.target.value })} placeholder="https://…/banner.jpg" />
                    </Field>
                    <Slider label="Image height" value={config.headerImage.height} min={160} max={720} step={4} onChange={(v) => setHeaderImage({ height: v })} />
                    <Slider label="Header overlap (how far it tucks up behind the header)" value={config.headerImage.offset} min={0} max={160} step={4} onChange={(v) => setHeaderImage({ offset: v })} />
                    <Slider label="Darken (tint)" value={config.headerImage.tint} min={0} max={80} unit="%" onChange={(v) => setHeaderImage({ tint: v })} />
                  </>
                )}
              </details>

              <details className="glp-sec" open>
                <summary className="glp-sec__label">Sections</summary>
                {config.sections.map((section, i) => (
                  <SectionEditor
                    key={section.id}
                    section={section}
                    index={i}
                    count={config.sections.length}
                    open={openSection === section.id}
                    onToggle={() => setOpenSection(openSection === section.id ? null : section.id)}
                    onMove={(dir) => moveSection(section.id, dir)}
                    onRemove={() => removeSection(section.id)}
                    onChange={(next) => updateSection(section.id, next)}
                    cardOps={cardOpsFor(section.id)}
                    openCard={openCard}
                    setOpenCard={setOpenCard}
                  />
                ))}
                <button className="glp-add" type="button" onClick={addSection} disabled={config.sections.length >= 6}>
                  + Add section ({config.sections.length}/6)
                </button>
              </details>

              <details className="glp-sec" open>
                <summary className="glp-sec__label">Page width</summary>
                <Field label="Maximum content width">
                  <Seg
                    value={config.layout.maxW}
                    onChange={(v) => setLayout({ maxW: v })}
                    options={[
                      { value: 960, label: "Narrow" },
                      { value: 1120, label: "Default" },
                      { value: 1280, label: "Wide" },
                    ]}
                  />
                </Field>
              </details>

              <details className="glp-sec" open>
                <summary className="glp-sec__label">Contact banner</summary>
                <label className="glp-toggle">
                  <input type="checkbox" checked={config.banner.enabled} onChange={(e) => setBanner({ enabled: e.target.checked })} />
                  <span className="glp-toggle__text">
                    <b>Show a banner below the cards</b>
                    <span>Full-width call-to-action, like dLocal's "Need help building your solution?"</span>
                  </span>
                </label>
                {config.banner.enabled && (
                  <>
                    <Field label="Banner title">
                      <input className="glp-input" value={config.banner.title} onChange={(e) => setBanner({ title: e.target.value })} />
                    </Field>
                    <Field label="Banner text">
                      <textarea className="glp-textarea" value={config.banner.text} onChange={(e) => setBanner({ text: e.target.value })} />
                    </Field>
                    <div className="glp-row2">
                      <Field label="Button label">
                        <input className="glp-input" value={config.banner.btnLabel} onChange={(e) => setBanner({ btnLabel: e.target.value })} />
                      </Field>
                      <Field label="Button link">
                        <input className="glp-input" value={config.banner.btnHref} onChange={(e) => setBanner({ btnHref: normPath(e.target.value) })} />
                      </Field>
                    </div>
                  </>
                )}
              </details>

              <details className="glp-sec" open>
                <summary className="glp-sec__label">Footer</summary>
                <Field label="Footer line (blank to hide)">
                  <input className="glp-input" value={config.footer} onChange={(e) => patch({ footer: e.target.value })} />
                </Field>
              </details>
            </div>
            <Preview html={generated} mode={mode} setMode={setMode} device={device} setDevice={setDevice} liquidNote={hasLiquid} />
          </>
        ) : (
          <>
            <div className="glp-code">
              {override !== null && (
                <div className="glp-banner">
                  <span>Edited by hand — builder changes won't apply until you sync.</span>
                  <button className="glp-smallbtn" type="button" onClick={() => setOverride(null)}>
                    Sync from builder
                  </button>
                </div>
              )}
              <div className="glp-code__bar">
                <span className="glp-view__label">Raw HTML{hasLiquid && !override ? " + Liquid" : ""}</span>
                {hasLiquid && !override && <span className="glp-chip glp-chip--liquid">liquid</span>}
                <span className={"glp-chip" + (override !== null ? " glp-chip--warn" : "")}>
                  {override !== null ? "manual edits" : "generated from builder"}
                </span>
                <span className="glp-chip">{(exportHtml.length / 1024).toFixed(1)} KB</span>
              </div>
              <textarea spellCheck={false} value={exportHtml} onChange={(e) => setOverride(e.target.value)} />
            </div>
            <Preview html={exportHtml} mode={mode} setMode={setMode} device={device} setDevice={setDevice} liquidNote={hasLiquid && !override} />
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
